<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KGI管理 — 目標達成管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --accent:#1D6FDB;--accent-hover:#1558b0;
  --bg:#f0f2f5;--bg-sub:#e8eaed;--card:#fff;--border:#e0e3e8;
  --text:#1a1a2e;--text-secondary:#5a6172;--text-tertiary:#737373;
  --radius:8px;--radius-md:10px;--shadow:0 1px 4px rgba(0,0,0,.08);
  --danger:#D32F2F;--bg-danger:#FEECEC;--text-danger:#A32D2D;
  --warning:#B45309;--bg-warning:#FEF3C7;--text-warning:#92400E;
  --bg-success:#DCFCE7;--text-success:#166534;--success:#1D9E75;
  --font-mono:'SF Mono','Fira Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
#app{min-height:100vh;}
.layout{display:grid;grid-template-columns:210px 1fr;grid-template-rows:52px 1fr;min-height:100vh;}
.topbar{grid-column:1/3;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100;height:52px;}
.topbar-title{font-weight:800;font-size:16px;color:var(--accent);margin-right:auto;display:flex;align-items:center;gap:6px;}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background .15s;}
.nav-item:hover{background:var(--bg);}
.nav-item.active{background:#eff6ff;color:var(--accent);font-weight:600;}
.nav-item i{font-size:16px;flex-shrink:0;}
.content{padding:18px;overflow-y:auto;}
.card{background:var(--card);border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
.section-title{font-weight:700;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover);}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:default;}
.form-control{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--card);color:var(--text);outline:none;}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(29,111,219,.12);}
textarea.form-control{resize:vertical;}
.form-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;font-weight:500;}
.select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--card);color:var(--text);cursor:pointer;outline:none;}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.table-wrap{overflow-x:auto;}
table.list{width:100%;border-collapse:collapse;font-size:13px;}
table.list th{background:var(--bg-sub);padding:8px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--border);}
table.list td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.list tr:hover td{background:#f8faff;}
.stat-card{background:var(--card);border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow);text-align:center;}
.stat-val{font-size:26px;font-weight:800;font-family:var(--font-mono);color:var(--accent);}
.stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.timeline{list-style:none;position:relative;padding-left:28px;}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border);}
.timeline li{position:relative;margin-bottom:14px;}
.timeline li::before{content:'';position:absolute;left:-22px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--card);}
.timeline-meta{font-size:11px;color:var(--text-tertiary);margin-bottom:3px;}
.timeline-body{background:var(--bg);border-radius:var(--radius);padding:8px 10px;font-size:13px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--card);border-radius:var(--radius-md);padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.form-row>div{flex:1;min-width:130px;}
.prediction-bar{height:10px;border-radius:5px;background:var(--border);overflow:hidden;margin-top:6px;}
.prediction-fill{height:100%;border-radius:5px;transition:width .6s;}
.tip{font-size:12px;color:var(--text-tertiary);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;background:var(--bg-sub);color:var(--text-secondary);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-error{background:#A32D2D;}.toast-info{background:#1565c0;}
@media(max-width:700px){
  .layout{grid-template-columns:1fr;}
  .topbar{grid-column:1;}
  .sidebar{display:none;}
  .grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===== CONSTANTS ===== */
const CRM_KEY='crmSystemState_v1';
const KPI_KEY='kpiSystemState_v2';
const TODAY=new Date();
const REAL_Y=TODAY.getFullYear(),REAL_M=TODAY.getMonth(),REAL_D=TODAY.getDate();

const DEAL_PHASES=[
  {id:'lead',label:'リード',bg:'#F3F4F6',c:'#6B7280'},
  {id:'approach',label:'アプローチ',bg:'#DBEAFE',c:'#1D4ED8'},
  {id:'proposal',label:'提案',bg:'#FEF3C7',c:'#92400E'},
  {id:'negotiation',label:'交渉',bg:'#EDE9FE',c:'#5B21B6'},
  {id:'closing',label:'クロージング',bg:'#FCE7F3',c:'#9D174D'},
];
const CUST_STATUS=[
  {id:'lead',label:'リード',bg:'#F3F4F6',c:'#6B7280'},
  {id:'prospect',label:'見込み',bg:'#DBEAFE',c:'#1D4ED8'},
  {id:'negotiating',label:'商談中',bg:'#FEF3C7',c:'#92400E'},
  {id:'won',label:'成約',bg:'#DCFCE7',c:'#166534'},
  {id:'lost',label:'失注',bg:'#FEECEC',c:'#A32D2D'},
];
/* ===== SHARED KPI STATE ===== */
let kpiState=null;
let STAFF_LIST=[];
function loadKpiShared(){
  try{
    const raw=localStorage.getItem(KPI_KEY);
    if(!raw)return;
    kpiState=JSON.parse(raw);
    if(Array.isArray(kpiState._staffList)&&kpiState._staffList.length)
      STAFF_LIST=kpiState._staffList;
  }catch(e){}
}
function isStaffActive(si){return !((kpiState&&kpiState.staffInactive)||[]).includes(si);}
function sumKpiCRM(si,k){
  if(!kpiState||!kpiState.kpiData)return null;
  const pd=kpiState.kpiData[pKey()]||{};
  if(si==='all')return STAFF_LIST.reduce((s,_,i)=>s+Object.values(pd[i]||{}).reduce((a,d)=>a+(d[k]||0),0),0);
  return Object.values(pd[si]||{}).reduce((s,d)=>s+(d[k]||0),0);
}

/* ===== SHARED CRM STATE（customer_crm.html） ===== */
const CRM_CUSTOMER_KEY='crmCustomerState_v1';
let crmCustomerState=null;
function loadCrmData(){
  try{
    const raw=localStorage.getItem(CRM_CUSTOMER_KEY);
    if(!raw)return;
    crmCustomerState=JSON.parse(raw);
  }catch(e){}
}
// CRM（customer_crm.html）で顧客ステータスが「完了」になった顧客を案件（成約）として自動転記
function syncDealsFromCrm(){
  if(!crmCustomerState)return;
  const customers=crmCustomerState.customers||[];
  const contacts=crmCustomerState.contacts||[];
  const products=crmCustomerState.products||[];
  let changed=false;
  customers.filter(c=>c.status==='完了').forEach(cust=>{
    const crmSourceId='crm_'+cust.id;
    if(state.deals.some(d=>d.crmSourceId===crmSourceId))return;
    const custContacts=contacts.filter(h=>h.cid===cust.id).sort((a,b)=>(b.at||0)-(a.at||0));
    const latest=custContacts[0]||null;
    const product=latest?products.find(p=>p.id===latest.pid):null;
    const staffSi=latest&&latest.si!=null?latest.si:0;
    const closedAt=latest&&latest.at?fmt(latest.at).replace(/\//g,'-'):curMonthStr()+'-'+pad2(REAL_D);
    state.deals.push({
      id:genId(),createdAt:latest?.at||Date.now(),crmSourceId,
      title:(cust.company||cust.name)+(product?` / ${product.name}`:''),
      customerId:null,count:1,amount:0,phase:'closing',probability:100,
      expectedCloseDate:closedAt,status:'won',staffSi,closedAt,
      link:'',memo:`CRM（顧客管理）から自動転記：${cust.name}`,
    });
    changed=true;
  });
  if(changed)saveState();
}

/* ===== STATE ===== */
let state={
  page:'login',role:null,user:null,
  deals:[],
  dealFilter:{phase:'all',staff:'all',statusF:'open'},
  goalOverride:null, // null = KPIシステムの契約数目標を参照
};

/* ===== PERSISTENCE ===== */
function saveState(){try{localStorage.setItem(CRM_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){try{const r=localStorage.getItem(CRM_KEY);if(r)Object.assign(state,JSON.parse(r));}catch(e){}}

/* ===== データバックアップ（端末ローカルのみ・外部送信なし） ===== */
const BACKUP_KEY='_crmLastBackupAt';
const BACKUP_INTERVAL_MS=12*60*60*1000; // 12時間以上経過していたらログイン時に自動バックアップ
let _backupChecked=false;
function lastBackupLabel(){
  const t=parseInt(localStorage.getItem(BACKUP_KEY)||'0');
  if(!t)return '（バックアップ未実施）';
  const d=new Date(t);
  return '最終バックアップ: '+d.getFullYear()+'/'+pad2(d.getMonth()+1)+'/'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());
}
function exportFullBackup(silent){
  saveState();
  const raw=localStorage.getItem(CRM_KEY)||'{}';
  const blob=new Blob([raw],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const d=new Date();
  const a=document.createElement('a');
  a.href=url;a.download='kgi_backup_'+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+'_'+pad2(d.getHours())+pad2(d.getMinutes())+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  localStorage.setItem(BACKUP_KEY,String(Date.now()));
  if(!silent)toast('バックアップを保存しました');
}
function checkAutoBackup(){
  const t=parseInt(localStorage.getItem(BACKUP_KEY)||'0');
  if(Date.now()-t>BACKUP_INTERVAL_MS)exportFullBackup(true);
}
let _restorePending=null; // {text, name}
function onRestoreFileSelected(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let parsed;
    try{parsed=JSON.parse(reader.result);}catch{toast('JSONファイルを読み込めませんでした','error');return;}
    if(!parsed||typeof parsed!=='object'||!('deals' in parsed)){toast('KGIシステムのバックアップファイルではないようです','error');return;}
    _restorePending={text:reader.result,name:file.name};
    render();
  };
  reader.readAsText(file);
}
function confirmRestore(){
  if(!_restorePending)return;
  localStorage.setItem(CRM_KEY,_restorePending.text);
  location.reload();
}
function cancelRestore(){_restorePending=null;render();}

/* ===== UTILITIES ===== */
function pad2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(d){if(!d)return '—';const dt=new Date(d);return `${dt.getFullYear()}/${pad2(dt.getMonth()+1)}/${pad2(dt.getDate())}`;}
function fmtAmt(n){return n!=null&&n!==''?Number(n).toLocaleString()+'円':'—';}
function pKey(){return `${REAL_Y}_${REAL_M}`;}
function curMonthStr(){return `${REAL_Y}-${pad2(REAL_M+1)}`;}
function staffName(si){return STAFF_LIST[si]!=null?STAFF_LIST[si]:'—';}
function isAdmin(){return state.role==='admin';}
function mySi(){return state.user;}
function toast(msg,type='success'){
  const t=document.createElement('div');
  t.className='toast toast-'+type;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);
}

/* ===== CHIPS ===== */
function phaseChip(id){const p=DEAL_PHASES.find(x=>x.id===id)||DEAL_PHASES[0];return `<span class="chip" style="background:${p.bg};color:${p.c}">${p.label}</span>`;}
function statusChip(id){const s=CUST_STATUS.find(x=>x.id===id)||CUST_STATUS[0];return `<span class="chip" style="background:${s.bg};color:${s.c}">${s.label}</span>`;}
function dealStatusChip(s){return s==='won'?`<span class="chip" style="background:var(--bg-success);color:var(--text-success)">成約</span>`:s==='lost'?`<span class="chip" style="background:var(--bg-danger);color:var(--text-danger)">失注</span>`:`<span class="chip" style="background:#e3f2fd;color:#1565c0">進行中</span>`;}

/* ===== MONTH-END PREDICTION ===== */
function monthPrediction(si='all'){
  const ms=curMonthStr();
  const myDeals=d=>(si==='all'||d.staffSi===si);
  // 今月成約
  const wonD=state.deals.filter(d=>myDeals(d)&&d.status==='won'&&(d.closedAt||'').startsWith(ms));
  const wonCount=wonD.reduce((s,d)=>s+(d.count||1),0);
  const wonAmt=wonD.reduce((s,d)=>s+(d.amount||0),0);
  // パイプライン（今月クロージング予定の進行中）
  const openD=state.deals.filter(d=>myDeals(d)&&d.status==='open'&&(d.expectedCloseDate||'').startsWith(ms));
  const pipeCount=openD.reduce((s,d)=>s+(d.count||1)*(d.probability||0)/100,0);
  const pipeAmt=openD.reduce((s,d)=>s+(d.amount||0)*(d.probability||0)/100,0);
  // 目標：上書き or KPIシステム参照
  let target=state.goalOverride||0;
  if(!state.goalOverride&&kpiState&&kpiState.goals){
    const gd=kpiState.goals[pKey()]||{};
    if(si==='all'){STAFF_LIST.forEach((_,i)=>{if(isStaffActive(i))target+=(gd[i]&&gd[i]['契約数'])||0;});}
    else{target=(gd[si]&&gd[si]['契約数'])||0;}
  }
  const predictCount=wonCount+Math.round(pipeCount);
  const predictAmt=wonAmt+Math.round(pipeAmt);
  const gap=target-predictCount;
  const pct=target>0?Math.min(100,Math.round(predictCount/target*100)):0;
  return{wonCount,wonAmt,pipeCount:Math.round(pipeCount),pipeAmt:Math.round(pipeAmt),predictCount,predictAmt,target,gap,pct};
}

function predComment(p){
  if(!p.target)return{lv:'info',msg:'KPIシステムで今月の「契約数」目標を設定すると月末着地予測が表示されます。'};
  if(p.gap<=0)return{lv:'success',msg:`目標達成見込みです！ 現在のペースを維持してください。`};
  if(p.pct>=80)return{lv:'warn',msg:`あと <b>${p.gap}件</b> で目標達成。商談中案件のクロージングに集中しましょう。`};
  if(p.pct>=50)return{lv:'warn',msg:`目標まで <b>${p.gap}件</b> 不足の見込みです。提案フェーズの案件を前に進めてください。`};
  return{lv:'danger',msg:`目標に対して <b>${p.gap}件</b> 不足の見込みです。新規リード獲得とアプローチを強化してください。`};
}

/* ===== AUTH ===== */
function getStaffPw(si){return((kpiState&&kpiState.staffPw)||{})[si]||{};}
function getAdminPw(){return(kpiState&&kpiState.adminPw)||'admin@1234';}

/* ===== LAYOUT ===== */
function topBar(){
  const name=isAdmin()?'管理者':esc(staffName(state.user));
  return `<div class="topbar">
    <div class="topbar-title"><i class="ti ti-target"></i> KGI管理</div>
    <span class="badge"><i class="ti ti-user"></i> ${name}</span>
    <a href="kpi_system.html" class="btn btn-sm" style="text-decoration:none"><i class="ti ti-chart-bar"></i> KPI管理</a>
    <button class="btn btn-sm" id="logout-btn"><i class="ti ti-logout"></i> ログアウト</button>
  </div>`;
}

function sidebar(){
  const items=[
    {id:'dashboard',icon:'ti-layout-dashboard',label:'ダッシュボード'},
    {id:'deals',icon:'ti-briefcase',label:'案件管理'},
    ...(isAdmin()?[{id:'admin',icon:'ti-shield',label:'管理者ビュー'}]:[]),
  ];
  return `<div class="sidebar">${items.map(it=>`<div class="nav-item${state.page===it.id?' active':''}" data-nav="${it.id}"><i class="ti ${it.icon}"></i>${it.label}</div>`).join('')}</div>`;
}

/* ===== LOGIN PAGE ===== */
function loginPage(){
  const hasKpi=!!(kpiState&&STAFF_LIST.length);
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px">
    <div class="card" style="width:100%;max-width:360px;padding:28px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:34px;font-weight:800;color:var(--accent)"><i class="ti ti-target"></i> KGI管理</div>
        <div style="color:var(--text-secondary);font-size:13px;margin-top:4px">目標達成管理システム（管理者専用）</div>
      </div>
      ${!hasKpi?`<div style="padding:10px 12px;background:var(--bg-warning);color:var(--text-warning);border-radius:var(--radius);font-size:12px;margin-bottom:14px">
        <i class="ti ti-alert-triangle"></i> KPIシステムのデータが見つかりません。先に <a href="kpi_system.html" style="color:var(--text-warning);font-weight:600">KPI管理システム</a> を開いてログインしてください。
      </div>`:''}
      <div style="margin-bottom:10px"><div class="form-label">スタッフ</div>
        <select class="select" id="login-user" style="width:100%">
          <option value="">選択してください</option>
          ${STAFF_LIST.map((s,i)=>isStaffActive(i)?`<option value="${i}">${esc(s)}</option>`:'').join('')}
          <option value="admin">── 管理者 ──</option>
        </select>
      </div>
      <div style="margin-bottom:16px"><div class="form-label">パスワード</div>
        <input type="password" class="form-control" id="login-pw" placeholder="KPIシステムと同じパスワード">
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%"><i class="ti ti-login"></i> ログイン</button>
      <div style="text-align:center;margin-top:14px">
        <a href="kpi_system.html" style="font-size:12px;color:var(--text-tertiary);text-decoration:none"><i class="ti ti-chart-bar"></i> KPI管理システムへ</a>
      </div>
    </div>
  </div>`;
}

/* ===== DASHBOARD PAGE ===== */
function dashboardPage(){
  const si=isAdmin()?'all':mySi();
  const pred=monthPrediction(si);
  const comment=predComment(pred);
  const cc={success:{bg:'var(--bg-success)',c:'var(--text-success)',icon:'ti-circle-check'},
    warn:{bg:'var(--bg-warning)',c:'var(--text-warning)',icon:'ti-alert-triangle'},
    danger:{bg:'var(--bg-danger)',c:'var(--text-danger)',icon:'ti-alert-circle'},
    info:{bg:'#e3f2fd',c:'#1565c0',icon:'ti-info-circle'}}[comment.lv];
  const fillColor=pred.pct>=100?'var(--success)':pred.pct>=70?'#f59e0b':'var(--danger)';
  const ms=curMonthStr();
  const crmWonCount=state.deals.filter(d=>!!d.crmSourceId&&d.status==='won'&&(si==='all'||d.staffSi===si)&&(d.closedAt||'').startsWith(ms)).reduce((s,d)=>s+(d.count||1),0);

  // パイプライン（フェーズ別）
  const myOpenDeals=state.deals.filter(d=>d.status==='open'&&(si==='all'||d.staffSi===si));
  const phaseRows=DEAL_PHASES.map(p=>{

/* ===== BIND ===== */
function bindLogin(){
  const btn=document.getElementById('login-btn');
  if(!btn)return;
  const doLogin=()=>{
    const uVal=(document.getElementById('login-user')||{}).value||'';
    const pw=(document.getElementById('login-pw')||{}).value||'';
    if(!uVal){toast('スタッフを選択してください','error');return;}
    if(uVal==='admin'){
      if(pw!==getAdminPw()){toast('パスワードが違います','error');return;}
      state.role='admin';state.user=null;
    }else{
      const si=parseInt(uVal);
      const spw=getStaffPw(si);
      if(pw!==(spw.pw||'kpi@1234')){toast('パスワードが違います','error');return;}
      state.role='staff';state.user=si;
    }
    state.page='dashboard';render();
  };
  btn.onclick=doLogin;
  const pw=document.getElementById('login-pw');
  if(pw)pw.onkeydown=e=>{if(e.key==='Enter')doLogin();};
}

function bindPage(){
  // ログアウト
  const lo=document.getElementById('logout-btn');
  if(lo)lo.onclick=()=>{exportFullBackup(true);state.role=null;state.user=null;state.page='login';render();};
  // ナビ
  document.querySelectorAll('[data-nav]').forEach(el=>{el.onclick=()=>{state.page=el.dataset.nav;render();};});
  const dfp=document.getElementById('deal-filter-phase');if(dfp)dfp.onchange=()=>{state.dealFilter.phase=dfp.value;render();};
  const dfst=document.getElementById('deal-filter-staff');if(dfst)dfst.onchange=()=>{state.dealFilter.staff=dfst.value;render();};
  const dfstt=document.getElementById('deal-filter-status');if(dfstt)dfstt.onchange=()=>{state.dealFilter.statusF=dfstt.value;render();};
  const backupBtn=document.getElementById('manual-backup-btn');if(backupBtn)backupBtn.onclick=()=>{exportFullBackup(false);render();};
  const restorePickBtn=document.getElementById('restore-pick-btn');if(restorePickBtn)restorePickBtn.onclick=()=>document.getElementById('restore-file-input').click();
  const restoreInput=document.getElementById('restore-file-input');if(restoreInput)restoreInput.onchange=e=>onRestoreFileSelected(e.target.files[0]);
  const restoreConfirmBtn=document.getElementById('restore-confirm-btn');if(restoreConfirmBtn)restoreConfirmBtn.onclick=confirmRestore;
  const restoreCancelBtn=document.getElementById('restore-cancel-btn');if(restoreCancelBtn)restoreCancelBtn.onclick=cancelRestore;
}

(function apoWatchdog(){
  var CRM_KEY='crmCustomerState_v1',DIS_KEY='_apoDismissed',BID='_apoBanner',TWENTY=20*60*1000;
  function p(n){return String(n).padStart(2,'0');}
  function fdt(ts){var d=new Date(ts);return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());}
  function es(s){var e=document.createElement('div');e.textContent=String(s??'');return e.innerHTML;}
  function getUser(){
    try{var c=JSON.parse(sessionStorage.getItem('crmCustomerSession_v1')||'null');if(c?.role)return c;}catch{}
    if(typeof state!=='undefined'&&state.role)return{role:state.role,user:state.user};
    try{var k=JSON.parse(localStorage.getItem('kpiSystemState_v2')||'null');if(k?.role)return{role:k.role,user:k.user};}catch{}
    return null;
  }
  function run(){
    var s=getUser();if(!s)return;
    var crmD;try{crmD=JSON.parse(localStorage.getItem(CRM_KEY)||'null');}catch{return;}
    if(!crmD?.appointments?.length)return;
    var now=Date.now(),dis=JSON.parse(sessionStorage.getItem(DIS_KEY)||'[]');
    var found=crmD.appointments.filter(function(a){
      if(dis.indexOf(a.id)>=0)return false;
      var diff=a.at-now;
      if(diff<-60000||diff>TWENTY)return false;
      if(s.role==='staff'&&a.si!==s.user)return false;
      return true;
    });
    show(found,crmD.customers||[]);
  }
  function show(apos,custs){
    var el=document.getElementById(BID);
    if(!apos.length){if(el)el.remove();return;}
    if(!el){el=document.createElement('div');el.id=BID;el.style.cssText='position:fixed;top:0;left:0;right:0;z-index:10000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';document.body.prepend(el);}
    var html=apos.map(function(a,i){
      var c=custs.find(function(x){return x.id===a.cid;});
      var diff=a.at-Date.now(),min=Math.max(0,Math.round(diff/60000));
      var label=min<=0?'今すぐ！':'あと'+min+'分';
      var name=c?es(c.name):'顧客';
      var cid=c?'<span style="font-size:13px;font-weight:500;opacity:.75;margin-left:6px">ID: <span data-apo-copy="'+c.id+'" style="cursor:pointer;background:rgba(255,255,255,.18);border-radius:4px;padding:1px 6px;font-family:monospace;user-select:all" title="クリックしてコピー">'+c.id+'</span></span>':'';
      var note=a.note?' / '+es(a.note):'';
      var sep=i>0?'<div style="border-top:1px solid rgba(255,255,255,.25);margin:10px 0"></div>':'';
      var href='customer_crm.html'+(c?'?cid='+c.id:'');
      return sep+'<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap"><span style="font-size:26px;flex-shrink:0">🔔</span><div style="flex:1;min-width:0"><div style="font-size:18px;font-weight:800">【'+es(label)+'】 '+name+'様'+cid+' — アポイント</div><div style="font-size:13px;opacity:.9;margin-top:3px">'+fdt(a.at)+note+'</div></div><a href="'+href+'" style="background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap">詳細を見る</a><button data-dis="'+a.id+'" style="background:rgba(0,0,0,.18);border:none;color:rgba(255,255,255,.85);border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px;white-space:nowrap">閉じる</button></div>';
    }).join('');
    el.innerHTML='<div style="background:linear-gradient(135deg,#DC2626,#B91C1C);color:#fff;padding:16px 22px;box-shadow:0 4px 24px rgba(0,0,0,.35)">'+html+'</div>';
    el.querySelectorAll('[data-dis]').forEach(function(b){b.onclick=function(){var dis=JSON.parse(sessionStorage.getItem(DIS_KEY)||'[]');dis.push(b.dataset.dis);sessionStorage.setItem(DIS_KEY,JSON.stringify(dis));run();};});
    el.querySelectorAll('[data-apo-copy]').forEach(function(b){b.onclick=function(){navigator.clipboard.writeText(b.dataset.apoCopy).then(function(){var o=b.style.background;b.style.background='rgba(255,255,255,.45)';setTimeout(function(){b.style.background=o;},1200);}).catch(function(){});};});
  }
  run();
  setInterval(run,30000);
})();
</script>
</body>
</html>
