<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI管理システム — コールセンター・営業</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f5;--bg-tertiary:#efefef;
  --bg-info:#e6f1fb;--bg-success:#eaf3de;--bg-warning:#faeeda;--bg-danger:#fcebeb;
  --text-primary:#1a1a1a;--text-secondary:#555;--text-tertiary:#737373;
  --text-info:#185FA5;--text-success:#3B6D11;--text-warning:#854F0B;--text-danger:#A32D2D;
  --border:#e0e0e0;--border-md:#ccc;
  --radius-md:8px;--radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Meiryo',sans-serif;
  --font-mono:'SF Mono','Consolas','Courier New',monospace;
}
body{font-family:var(--font-sans);font-size:14px;color:var(--text-primary);background:var(--bg-tertiary);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:204px;background:var(--bg-primary);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:14px;font-weight:600}
.sidebar-sub{font-size:11px;color:var(--text-secondary);margin-top:3px}
.nav-section{padding:8px 0;flex:1;overflow-y:auto}
.nav-group-label{font-size:10px;color:var(--text-tertiary);padding:8px 16px 2px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg-secondary)}
.nav-item.active{background:var(--bg-info);color:var(--text-info);font-weight:600;border-left-color:var(--text-info)}
.nav-item i{font-size:17px}
.nav-item.admin-only{color:#854F0B}
.nav-item.admin-only.active{background:#faeeda;color:#854F0B;border-left-color:#BA7517}
.nav-item.admin-only:hover{background:#fff8ee}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--bg-primary);border-bottom:1px solid var(--border);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
/* 期間ナビ（年＋月切替） */
.period-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 12px;margin-bottom:16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-md)}
.period-bar-label{font-size:12px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:5px}
.period-bar-hist{font-size:11px;font-weight:600;color:var(--text-info);background:var(--bg-info);padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.period-nav{display:flex;align-items:center;gap:5px}
.pn-btn{width:27px;height:27px;border:1px solid var(--border-md);border-radius:6px;background:var(--bg-primary);cursor:pointer;color:var(--text-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:16px;padding:0}
.pn-btn:hover:not(:disabled){background:var(--bg-secondary);color:var(--text-primary)}
.pn-btn:disabled{opacity:.3;cursor:not-allowed}
.pn-sel{padding:5px 7px;border:1px solid var(--border-md);border-radius:6px;font-size:12px;background:var(--bg-primary);color:var(--text-primary);cursor:pointer;font-family:inherit;font-weight:600}
.pn-sel:focus{outline:none;border-color:#185FA5}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.badge-staff{background:var(--bg-success);color:var(--text-success)}
.badge-admin{background:var(--bg-warning);color:var(--text-warning)}
.content{flex:1;overflow-y:auto;padding:20px}
/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#e6f1fb 0%,#f5f5f5 100%)}
.login-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-logo i{color:var(--text-info)}
.login-sub{font-size:12px;color:var(--text-secondary);text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text-secondary);margin-bottom:5px;display:block;font-weight:500}
.form-control{width:100%;padding:9px 11px;border:1px solid var(--border-md);border-radius:var(--radius-md);font-size:13px;background:var(--bg-primary);color:var(--text-primary);transition:border-color .15s;font-family:inherit}
.form-control:focus{outline:none;border-color:#185FA5}
select.form-control{cursor:pointer}
/* Buttons */
.btn{padding:8px 16px;border:1px solid var(--border-md);border-radius:var(--radius-md);cursor:pointer;font-size:13px;background:var(--bg-primary);color:var(--text-primary);transition:background .15s;font-family:inherit}
.btn:hover{background:var(--bg-secondary)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}
.btn-primary:hover{background:#0C447C;border-color:#0C447C}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-block{width:100%;padding:11px}
/* Cards */
.card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.metric-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px 16px}
.metric-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.metric-value{font-size:22px;font-weight:700}
.metric-sub{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.section-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-secondary)}
/* Attendance */
.attendance-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.att-btn{padding:18px 8px;border-radius:var(--radius-lg);border:1.5px solid var(--border);cursor:pointer;text-align:center;font-size:13px;font-weight:600;transition:all .15s;background:var(--bg-primary);font-family:inherit;line-height:1.6}
.att-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.att-btn.start{border-color:#1D9E75;color:#0F6E56}
.att-btn.start:hover:not(:disabled){background:#E1F5EE}
.att-btn.end-btn{border-color:#D85A30;color:#993C1D}
.att-btn.end-btn:hover:not(:disabled){background:#FAECE7}
.att-btn.break{border-color:#BA7517;color:#854F0B}
.att-btn.break:hover:not(:disabled){background:#FAEEDA}
.att-btn.ret{border-color:#185FA5;color:#0C447C}
.att-btn.ret:hover:not(:disabled){background:#E6F1FB}
.att-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
/* グリーティングトースト */
.greeting-toast{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:14px;font-size:14px;font-weight:500;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);line-height:1.6;display:none}
.greeting-toast.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* 退勤確認UI */
.confirm-bar{display:none;background:#FAECE7;border:1px solid #D85A30;border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:10px;align-items:center;gap:12px;flex-wrap:wrap}
.confirm-bar.show{display:flex}
/* Timeline */
.tl-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-dot.in{background:#1D9E75}
.tl-dot.out{background:#D85A30}
.tl-dot.brk{background:#BA7517}
.tl-dot.ret2{background:#185FA5}
.tl-time{color:var(--text-secondary);width:52px;font-family:var(--font-mono)}
/* Tables */
.kpi-table-wrap{overflow:auto;margin-top:8px;border-radius:var(--radius-md);border:1px solid var(--border)}
.kpi-table{border-collapse:collapse;width:100%;font-size:12px}
.kpi-table th{background:var(--bg-secondary);padding:7px 8px;text-align:center;border:1px solid var(--border);white-space:nowrap;font-weight:600;position:sticky;top:0;z-index:1;color:var(--text-secondary)}
.kpi-table th.row-header{text-align:left;position:sticky;left:0;z-index:2;background:var(--bg-secondary)}
.kpi-table td{padding:5px 8px;border:1px solid var(--border);text-align:right;white-space:nowrap;color:var(--text-primary)}
.kpi-table td.row-header{text-align:left;background:var(--bg-secondary);font-weight:500;position:sticky;left:0}
.kpi-table td.today{background:#EEF5FF}
.kpi-table td.total{background:var(--bg-secondary);font-weight:600}
.kpi-table td.rate{color:#185FA5;font-weight:500}
.kpi-table input[type=number]{width:62px;padding:3px 5px;border:1px solid var(--border-md);border-radius:5px;text-align:right;font-size:12px;background:#fff;color:var(--text-primary);font-family:inherit}
.kpi-table input[type=number]:focus{outline:none;border-color:#185FA5}
/* Progress */
.progress-bar{height:4px;background:var(--bg-tertiary);border-radius:2px;margin-top:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;font-weight:500;white-space:nowrap}
.tab:hover{color:var(--text-primary)}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:600}
/* Report */
.report-box{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;font-size:12px;line-height:1.9;white-space:pre-wrap;font-family:var(--font-mono);color:var(--text-primary);min-height:140px}
/* Team */
.team-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.rank-num{width:28px;font-size:13px;color:var(--text-tertiary);font-weight:600}
.rank-bar{flex:1;height:10px;background:var(--bg-secondary);border-radius:5px;overflow:hidden}
.rank-fill{height:100%;border-radius:5px;background:#185FA5;transition:width .4s}
.rank-val{width:55px;text-align:right;font-size:13px;font-weight:600}
/* Select / Toggle */
.select{padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius-md);font-size:13px;background:var(--bg-primary);color:var(--text-primary);cursor:pointer;font-family:inherit}
.toggle-group{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.toggle-btn{padding:5px 11px;border:1px solid var(--border-md);border-radius:20px;cursor:pointer;font-size:12px;background:var(--bg-primary);color:var(--text-secondary);font-family:inherit;transition:all .15s;font-weight:500}
.toggle-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.toggle-btn:hover:not(.active){background:var(--bg-secondary)}
/* Clock */
.clock-display{font-size:32px;font-weight:700;text-align:center;margin:10px 0;color:#185FA5;font-family:var(--font-mono);letter-spacing:.05em}
/* Status */
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.status-dot.working{background:#1D9E75}
.status-dot.off{background:#aaa}
.status-dot.break{background:#BA7517}
/* Chart */
.chart-wrap{position:relative;width:100%;height:220px;margin-top:8px}
/* Admin */
.admin-tag{font-size:10px;padding:2px 7px;background:var(--bg-warning);color:var(--text-warning);border-radius:4px;margin-left:6px;font-weight:500}
table.att-list{width:100%;border-collapse:collapse;font-size:12px}
table.att-list th{background:var(--bg-secondary);padding:7px 10px;text-align:left;border:1px solid var(--border);font-weight:600;color:var(--text-secondary)}
table.att-list td{padding:7px 10px;border:1px solid var(--border)}
/* Misc */
.chip{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;font-weight:500}
.chip.absent{background:#FCEBEB;color:#A32D2D}
.tip{font-size:11px;color:var(--text-tertiary)}
/* History */
.hist-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:12px;font-size:13px}
.hist-date{width:50px;font-weight:600;color:var(--text-secondary);font-family:var(--font-mono)}
.hist-times{flex:1;display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary)}
.hist-work{width:110px;font-weight:600;font-family:var(--font-mono);font-size:11px;text-align:right}
/* Total行ハイライト */
.total-row{background:#E6F1FB;border-radius:var(--radius-md);padding:12px 8px;margin-top:8px;display:flex;align-items:center;gap:12px}
/* Proxy */
.proxy-card{background:var(--bg-warning);border:1px solid #BA7517;border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px}
/* ===== レスポンシブ（スマホ・タブレット） ===== */
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--text-primary);padding:2px 8px 0;margin-right:2px;line-height:1}
.nav-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90}
.nav-backdrop.show{display:block}
@media(max-width:820px){
  .hamburger{display:inline-flex;align-items:center}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:240px;z-index:100;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 18px rgba(0,0,0,.18)}
  .sidebar.open{transform:translateX(0)}
  .content{padding:12px}
  .topbar{padding:0 10px}
  #live-clock{display:none}
  .topbar-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px;flex:1}
  .grid-4,.grid-3{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .period-bar{gap:6px;padding:8px 10px}
  .metric-value{font-size:18px}
  .login-card{width:92vw;max-width:360px;padding:26px 22px}
}
@media(max-width:480px){
  .attendance-btns{grid-template-columns:1fr 1fr}
  .tab{padding:8px 9px;font-size:12px}
  .toggle-btn{font-size:11px;padding:4px 9px}
  table.att-list{font-size:11px}
  table.att-list th,table.att-list td{padding:6px 6px}
  .clock-display{font-size:26px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
let STAFF_LIST=['田中 一郎','佐藤 花子','鈴木 太郎','高橋 美咲','伊藤 健司','渡辺 さくら','山本 浩二','中村 麗子','小林 大輔','加藤 由美']; // スタッフ管理で可変・永続化（_staffList として保存）
const KPI_ACT=['コール数','アプローチ数','対コールコンタクト数','対アプローチコンタクト数','完了数','クロージング数','依頼数','後確数','契約数','解約数'];
const KPI_RATE=['対コールコンタクト率','対アプローチコンタクト率','対コール完了率','対アプローチ完了率','クロージング率','依頼率','後確率','契約率','解約率'];
const KPI_CC=['着信数','応答数','通話時間(分)','20秒内応答数']; // コールセンター指標の入力値（応答率/放棄率/AHT/SLは自動計算）
// シフト種別（クリックで循環）。''=未設定
const SHIFT_TYPES=[
  {c:'早',label:'早番 9-18',   bg:'#eaf3de',tx:'#3B6D11', start:'09:00',end:'18:00'},
  {c:'A', label:'A番 10-19',   bg:'#d9edcf',tx:'#2C5C0F', start:'10:00',end:'19:00'},
  {c:'B', label:'B番 11-20',   bg:'#d0e8f5',tx:'#195E9A', start:'11:00',end:'20:00'},
  {c:'遅',label:'遅番 12-21',  bg:'#e6f1fb',tx:'#185FA5', start:'12:00',end:'21:00'},
  {c:'夜',label:'夜勤 17-翌2', bg:'#ede7f6',tx:'#5e35b1', start:'17:00',end:'02:00',nextDay:true},
  {c:'休',label:'休み',         bg:'#fcebeb',tx:'#A32D2D', start:null,  end:null}
];
// スタッフ希望提出・修正依頼で使う時間帯選択肢（SHIFT_TYPESと対応）
const PREF_SLOTS=[
  {label:'09:00〜18:00', start:'09:00',end:'18:00',code:'早'},
  {label:'10:00〜19:00', start:'10:00',end:'19:00',code:'A'},
  {label:'11:00〜20:00', start:'11:00',end:'20:00',code:'B'},
  {label:'12:00〜21:00', start:'12:00',end:'21:00',code:'遅'},
  {label:'17:00〜翌2:00',start:'17:00',end:'02:00',code:'夜'},
];
// 時刻プルダウン用オプション生成（startH〜endH-1時 30分刻み。h>=24は「翌HH:MM」表示・値はHH:MM）
function timeOpts(sel='',startH=6,endH=24){
  let h='';
  for(let i=startH;i<endH;i++){
    for(let m=0;m<60;m+=30){
      const rh=i%24,hh=pad2(rh),mm=m===0?'00':'30';
      const v=`${hh}:${mm}`,lbl=i>=24?`翌${hh}:${mm}`:v;
      h+=`<option value="${v}" ${sel===v?'selected':''}>${lbl}</option>`;
    }
  }
  return h;
}
const TODAY=new Date();
// 実際の今日（打刻など「現在」操作はこちらを使う）
const REAL_Y=TODAY.getFullYear(),REAL_M=TODAY.getMonth(),REAL_D=TODAY.getDate();
// Y/M/DAYS/TODAY_D は「閲覧中の月」を指す。recalcPeriod() で state.viewYear/viewMonth から更新する
let Y=REAL_Y,M=REAL_M,DAYS=new Date(REAL_Y,REAL_M+1,0).getDate();
let TODAY_D=REAL_D,LAST_D=REAL_D,IS_CURRENT=true,IS_FUTURE=false;
function recalcPeriod(){
  Y=state.viewYear;M=state.viewMonth;
  DAYS=new Date(Y,M+1,0).getDate();
  const cur=REAL_Y*12+REAL_M,vp=Y*12+M;
  IS_CURRENT=(vp===cur);IS_FUTURE=(vp>cur);
  LAST_D=IS_CURRENT?REAL_D:(IS_FUTURE?0:DAYS); // 実績のある最終日（当月=今日 / 過去月=月末 / 未来月=0）
  TODAY_D=IS_CURRENT?REAL_D:-1;                // 「今日」ハイライト用（当月のみ有効・他月は-1で不一致）
}
// 期間キー「年_月」と、その月のデータ部分集合を返すアクセサ（なければ生成）
function pKey(){return state.viewYear+'_'+state.viewMonth;}
function kData(){const k=pKey();if(!state.kpiData[k])state.kpiData[k]={};return state.kpiData[k];}
function gData(){const k=pKey();if(!state.goals[k])state.goals[k]={};return state.goals[k];}
function tData(){const k=pKey();if(!state.timeData[k])state.timeData[k]={};return state.timeData[k];}

// グリーティングメッセージ
const GREETINGS={
  in:(name)=>`${name}さん おはようございます！\n本日もよろしくお願いいたします！`,
  brk:()=>`いってらっしゃい！`,
  ret2:()=>`お帰りなさい！`,
  out:()=>`本日もありがとうございました！\nお疲れ様でした！`
};
const GREETING_COLORS={
  in:{bg:'#eaf3de',border:'#1D9E75',text:'#0F6E56',icon:'ti-sun'},
  brk:{bg:'#faeeda',border:'#BA7517',text:'#854F0B',icon:'ti-coffee'},
  ret2:{bg:'#e6f1fb',border:'#185FA5',text:'#0C447C',icon:'ti-home'},
  out:{bg:'#FAECE7',border:'#D85A30',text:'#993C1D',icon:'ti-moon'}
};

let state={
  page:'login',user:null,role:null,
  staffPw:{},adminPw:'admin@1234',pendingUser:null, // 個別認証：{si:{pw,changedYM}} / 管理者PW / 変更待ちスタッフ
  viewYear:REAL_Y,viewMonth:REAL_M,_gen:{}, // 閲覧中の年月 / 期間ごとのサンプル生成済みフラグ
  attStatus:{},attLog:[],clockInterval:null,greetingMsg:null,greetingType:null,
  clockStr:'--:--:--',workStart:{},breakStart:{},totalBreak:{},workEndTime:{}, // 実働タイマーは個人別 {si:値}
  kpiData:{},goals:{},activeStaff:0,kpiTab:'act',

// ランダム整数（min以上max以下）
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
// 上限付きランダム（0〜upper の整数、率をpct%以下に抑える）
function rndBelow(upper,pctMax){return Math.min(upper,Math.floor(upper*(rnd(0,pctMax)/100)));}

// HTMLエスケープ（innerHTML挿入時のXSS対策）
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// スタッフ名のサニタイズ（危険文字除去＋長さ制限。入力・復元時に適用）
function sanitizeName(s){return String(s==null?'':s).replace(/[<>"'`]/g,'').slice(0,40);}
// 非ブロッキングのトースト通知（alert/confirmの代替・ローカルHTMLでも確実に表示）
function toast(msg,type){
  const m={success:{bg:'#eaf3de',bd:'#1D9E75',tx:'#0F6E56',ic:'ti-check'},error:{bg:'#fcebeb',bd:'#A32D2D',tx:'#A32D2D',ic:'ti-alert-circle'},info:{bg:'#e6f1fb',bd:'#185FA5',tx:'#0C447C',ic:'ti-info-circle'}}[type]||{bg:'#e6f1fb',bd:'#185FA5',tx:'#0C447C',ic:'ti-info-circle'};
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:16px;right:16px;z-index:9999;background:'+m.bg+';border:1px solid '+m.bd+';color:'+m.tx+';padding:11px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.14);max-width:320px;display:flex;align-items:center;gap:8px;animation:fadeIn .25s ease';
  el.innerHTML='<i class="ti '+m.ic+'" style="font-size:16px"></i><span></span>';
  el.querySelector('span').textContent=msg; // textContentで挿入（XSS安全）
  document.body.appendChild(el);
  setTimeout(function(){el.style.transition='opacity .4s';el.style.opacity='0';setTimeout(function(){el.remove();},400);},2600);
}

// パスワードポリシー検証（OKならnull、NGならエラーメッセージ）
function validatePw(pw){
  if(!pw||pw.length<8)return 'パスワードは8文字以上にしてください';
  if(!/[A-Za-z]/.test(pw))return 'アルファベットを1文字以上含めてください';
  if(!/[0-9]/.test(pw))return '数字を1文字以上含めてください';
  if(!/[^A-Za-z0-9]/.test(pw))return '記号を1文字以上含めてください';
  return null;
}

/* ===== CSVエクスポート ===== */
function pad2(n){return String(n).padStart(2,'0');}
// CSVセルのエスケープ（カンマ・改行・引用符を含む値は""で囲む）
function csvCell(v){v=String(v==null?'':v);return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
// 2次元配列をCSVとしてダウンロード（Excelの日本語文字化け防止にUTF-8 BOM付与）
function downloadCSV(filename,rows){
  const csv=rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  toast('CSVを書き出しました：'+filename,'success');
}

/* ===== データ永続化（LocalStorage） ===== */
const PERSIST_KEY='kpiSystemState_v2'; // v2: データを期間（年_月）キーで保持
// 実行時オブジェクト・一時UI状態は保存対象外（dashChartは循環参照のため必ず除外）
const NO_PERSIST=['dashChart','clockInterval','_dashDrawChart','greetingMsg','greetingType','_prefillOtDate','_prefillLvDate'];
let _saveTimer=null;

// stateをLocalStorageへ保存（render()ごとに呼ぶ）
function saveState(){
  try{
    const copy={_staffList:STAFF_LIST}; // スタッフ名簿も保存
    for(const k in state){if(!NO_PERSIST.includes(k))copy[k]=state[k];}
    localStorage.setItem(PERSIST_KEY,JSON.stringify(copy));
  }catch(e){/* プライベートモード等で保存不可でも処理は継続 */}
}
// 連続入力（oninput）用：負荷軽減のため遅延保存
function saveStateDebounced(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    saveState();
    // 保存完了インジケータ（右下に一瞬表示）
    let ind=document.getElementById('_save-ind');
    if(!ind){ind=document.createElement('div');ind.id='_save-ind';ind.style.cssText='position:fixed;bottom:72px;right:16px;background:#1D9E75;color:#fff;font-size:11px;padding:4px 10px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;font-weight:600';ind.textContent='✓ 保存済み';document.body.appendChild(ind);}
    ind.style.opacity='1';clearTimeout(ind._t);ind._t=setTimeout(()=>{ind.style.opacity='0';},1200);
  },400);
}

// 保存済みstateを復元（あればtrue）。実行時フィールドは初期化する

    const parsed=JSON.parse(raw);
    if(Array.isArray(parsed._staffList)&&parsed._staffList.length)STAFF_LIST=parsed._staffList.map(sanitizeName);

/* ===== 目標値の下限保証 ===== */
// 目標は当月実績を下回らないよう調整する（達成率が非現実的に100%超で残るのを防ぐ）。
// 解約数は「少ないほど良い」指標のため対象外。
function ensureGoalFloor(){
  if(state._noSample)return; // 稼働開始後は目標の自動引き上げをしない
  STAFF_LIST.forEach((_,si)=>{
    if(!gData()[si])gData()[si]={};
    KPI_ACT.forEach(k=>{
      if(k==='解約数')return;
      const actual=sumKpi(si,k);
      if((gData()[si][k]||0)<actual){
        // 実績＋3〜18%の余裕を持たせて引き上げ（達成率 約85〜97%に着地）
        gData()[si][k]=Math.ceil(actual*(1+rnd(3,18)/100));
      }
    });
  });
}

/* ===== スタッフ管理（追加・削除） ===== */
// スタッフ追加：末尾に追加（既存indexは不変）。_genをクリアし新スタッフにもサンプルを生成
function addStaff(name){
  const nm=sanitizeName((name||'').trim())||('スタッフ'+(STAFF_LIST.length+1));
  STAFF_LIST.push(nm);
  state._gen={};
}
// スタッフ削除：indexがずれるため、index参照の全データを再キーする（r削除→r超は-1シフト）
function removeStaff(r){
  if(STAFF_LIST.length<=1)return; // 最低1名は残す
  STAFF_LIST.splice(r,1);
  const remap=i=>i<r?i:(i===r?null:i-1); // null=削除対象
  const reIntObj=obj=>{const o={};for(const k in obj){const ni=remap(+k);if(ni!==null)o[ni]=obj[k];}return o;};
  const rePeriodObj=pm=>{const o={};for(const pk in pm)o[pk]=reIntObj(pm[pk]);return o;};
  state.kpiData=rePeriodObj(state.kpiData);   // {period:{si:{day:{kpi}}}}
  state.goals=rePeriodObj(state.goals);       // {period:{si:{kpi}}}
  // timeData {period:{"si_kpi_slot":v}}
  const reTime=tm=>{const o={};for(const pk in tm){const inner={};for(const key in tm[pk]){const p=key.split('_');const ni=remap(+p[0]);if(ni===null)continue;p[0]=ni;inner[p.join('_')]=tm[pk][key];}o[pk]=inner;}return o;};
  state.timeData=reTime(state.timeData);
  // attLog dateKey="si_y_m_d" / proxyLog dateKey="proxy_si_y_m_d"
  state.attLog=state.attLog.map(l=>{const ni=remap(l.si);if(ni===null)return null;const p=l.dateKey.split('_');p[0]=ni;return {...l,si:ni,dateKey:p.join('_')};}).filter(Boolean);
  state.proxyLog=state.proxyLog.map(l=>{const ni=remap(l.si);if(ni===null)return null;const p=l.dateKey.split('_');p[1]=ni;return {...l,si:ni,dateKey:p.join('_')};}).filter(Boolean);
  // {si:val} 状態オブジェクト
  state.attStatus=reIntObj(state.attStatus);
  state.workStart=reIntObj(state.workStart);
  state.breakStart=reIntObj(state.breakStart);
  state.totalBreak=reIntObj(state.totalBreak);
  state.workEndTime=reIntObj(state.workEndTime);
  state.staffPw=reIntObj(state.staffPw);
  state.leaveData=reIntObj(state.leaveData);
  state.payroll=reIntObj(state.payroll);
  state.comments=reIntObj(state.comments);
  state.oneOnOne=reIntObj(state.oneOnOne);
  state.shifts=reIntObj(state.shifts);
  state.shiftNotify=reIntObj(state.shiftNotify||{});
  state.otNotify=reIntObj(state.otNotify||{});
  state.leaveNotify=reIntObj(state.leaveNotify||{});
  state.otRequests=state.otRequests.map(r=>{const ni=remap(r.si);return ni===null?null:{...r,si:ni};}).filter(Boolean);
  // シフト希望 {pk:{si:{...}}} を再キー
  const rePrefPeriod=pm=>{const o={};for(const pk in pm)o[pk]=reIntObj(pm[pk]);return o;};
  state.shiftPrefs=rePrefPeriod(state.shiftPrefs||{});
  state.shiftChangeReqs=(state.shiftChangeReqs||[]).map(r=>{const ni=remap(r.si);return ni===null?null:{...r,si:ni};}).filter(Boolean);
  state.proxyStatus=reIntObj(state.proxyStatus);
  state.proxyWorkStart=reIntObj(state.proxyWorkStart);
  state.proxyBreakStart=reIntObj(state.proxyBreakStart);
  state.proxyTotalBreak=reIntObj(state.proxyTotalBreak);
  // 選択中スタッフindexの補正（'total'は維持 / 削除されたら0へ）
  const reSel=v=>v==='total'?'total':(remap(v)===null?0:remap(v));
  state.activeStaff=reSel(state.activeStaff);
  state.dashStaff=reSel(state.dashStaff);
  state.histStaff=reSel(state.histStaff);
  state.ccStaff=reSel(state.ccStaff); // コールセンターページの選択も再キー（漏れるとCC画面でクラッシュ）
  state.goalStaff=state.goalStaff===-1?-1:(remap(state.goalStaff)===null?0:remap(state.goalStaff));
  if(state.tsStaff!==undefined)state.tsStaff=reSel(state.tsStaff);
  state.reportStaff=remap(state.reportStaff)===null?0:remap(state.reportStaff);
  state.proxyStaff=remap(state.proxyStaff)===null?0:remap(state.proxyStaff);
  if(state.summaryStaff!==undefined)state.summaryStaff=reSel(state.summaryStaff);
}

// 1日分のサンプル（ファネル＋CC）を生成。各値はundefinedのときのみ補完（冪等）
function genDayData(v){
  if(state._noSample)return; // 稼働開始リセット後はサンプル生成しない
  if(v['コール数']===undefined){
    const call=rnd(20,60),app=rnd(10,40);
    const cCont=rndBelow(call,80),aCont=rndBelow(app,80);
    const done=rndBelow(Math.min(call,app),60),closing=rndBelow(done,70);
    const req=rndBelow(closing,70),confirm=rndBelow(req,80),contract=rndBelow(confirm,60);
    const cancel=rnd(0,Math.max(1,Math.floor(contract*0.2)));
    v['コール数']=call;v['アプローチ数']=app;v['対コールコンタクト数']=cCont;v['対アプローチコンタクト数']=aCont;
    v['完了数']=done;v['クロージング数']=closing;v['依頼数']=req;v['後確数']=confirm;v['契約数']=contract;v['解約数']=cancel;
  }
  if(v['着信数']===undefined){
    v['着信数']=rnd(30,80);
    v['応答数']=Math.round(v['着信数']*rnd(80,98)/100); // 応答率80〜98%
    v['通話時間(分)']=v['応答数']*rnd(3,8);
  }
  // 20秒内応答数（サービスレベルSL算出用）。着信のある日は既存データにも遡って補完
  if(v['20秒内応答数']===undefined&&v['応答数']!==undefined)v['20秒内応答数']=Math.round(v['応答数']*rnd(70,95)/100);
}
// 指定期間(年,月0-index)のKPIサンプルを用意（前月比トレンド参照用・未来月は除外）

// 閲覧中月の前月（年,月0-index）

function calcRate(si,d){
  const v=kData()[si][d];
  // 率は最大100%にクランプ（分子が分母を超えた場合でも表示を壊さない）
  const pct=(num,den)=>{
    if(!den||den===0)return '—';
    const r=Math.min(100,(num/den)*100);
    return r.toFixed(1)+'%';
  };
  return {
    // 対コールコンタクト率 = コールに対して繋がった割合
    '対コールコンタクト率'       : pct(v['対コールコンタクト数'],   v['コール数']),
    // 対アプローチコンタクト率 = アプローチに対して繋がった割合
    '対アプローチコンタクト率'   : pct(v['対アプローチコンタクト数'],v['アプローチ数']),
    // 対コール完了率 = コールから完了した割合
    '対コール完了率'             : pct(v['完了数'],                  v['コール数']),
    // 対アプローチ完了率 = アプローチから完了した割合
    '対アプローチ完了率'         : pct(v['完了数'],                  v['アプローチ数']),
    // クロージング率 = 完了からクロージングに進んだ割合
    'クロージング率'             : pct(v['クロージング数'],           v['完了数']),
    // 依頼率 = クロージングから依頼を受けた割合
    '依頼率'                     : pct(v['依頼数'],                  v['クロージング数']),
    // 後確率 = 依頼から後日確認に進んだ割合
    '後確率'                     : pct(v['後確数'],                  v['依頼数']),
    // 契約率 = 後確から契約に至った割合
    '契約率'                     : pct(v['契約数'],                  v['後確数']),
    '解約率'                     : pct(v['解約数'],                  v['契約数'])
  };
}
function calcSlotRate(v){
  const pct=(num,den)=>{if(!den||den===0)return '—';return Math.min(100,(num/den)*100).toFixed(1)+'%';};
  return {
    '対コールコンタクト率'    :pct(v['対コールコンタクト数'],   v['コール数']),
    '対アプローチコンタクト率':pct(v['対アプローチコンタクト数'],v['アプローチ数']),
    '対コール完了率'          :pct(v['完了数'],                  v['コール数']),
    '対アプローチ完了率'      :pct(v['完了数'],                  v['アプローチ数']),
    'クロージング率'          :pct(v['クロージング数'],           v['完了数']),
    '依頼率'                  :pct(v['依頼数'],                  v['クロージング数']),
    '後確率'                  :pct(v['後確数'],                  v['依頼数']),
    '契約率'                  :pct(v['契約数'],                  v['後確数']),
    '解約率'                  :pct(v['解約数'],                  v['契約数']),
  };
}

// CC日次計算（応答率・放棄率・AHT分）
function calcCC(si,d){
  const v=(kData()[si]&&kData()[si][d])||{};

}
// CC月次集計
function ccMonthly(si){

}

/* ===== アラート ===== */
function computeAlerts(){
  const alerts=[];
  const elapsed=DAYS?Math.round(LAST_D/DAYS*100):0; // 当月の経過割合%
  STAFF_LIST.forEach((s,si)=>{
    const g=gData()[si]['コール数']||1;const ach=Math.round(sumKpi(si,'コール数')/g*100);
    if(IS_CURRENT&&elapsed>=20&&ach<elapsed*0.7)alerts.push({lv:'danger',s,msg:`コール数が大幅未達（達成${ach}% / 月経過${elapsed}%）`});
    const ab=absenceDays(si);
    if(ab>=3)alerts.push({lv:'danger',s,msg:`欠勤が${ab}日（当月）`});
    const cc=ccMonthly(si);
    if(cc.inb>0&&cc.abnRate>15)alerts.push({lv:'warn',s,msg:`放棄率が高い（${cc.abnRate.toFixed(1)}%）`});
    if(state.staffPw[si]&&mustChangePw(si))alerts.push({lv:'warn',s,msg:'今月パスワード未変更'});
    // 労務（残業・休憩不足・深夜）
    const lab=laborIssues(si);
    if(lab.overtimeDays>=4)alerts.push({lv:'warn',s,msg:`残業が${lab.overtimeDays}日（計${(lab.overtimeMin/60).toFixed(1)}h・当月）`});
    if(lab.shortBreakDays>=2)alerts.push({lv:'danger',s,msg:`休憩不足が${lab.shortBreakDays}日（労基）`});
    if(lab.lateNightDays>=1)alerts.push({lv:'warn',s,msg:`深夜退勤が${lab.lateNightDays}日`});
    const mo=missingOutDays(si);
    if(mo>=1)alerts.push({lv:'danger',s,msg:`退勤打刻漏れが${mo}日`});
    // シフト乖離アラート（早退60分以上が2日以上）
    let earlyExitDays=0;
    getDayLogs(si).forEach(d=>{const ds=`${Y}-${pad2(M+1)}-${pad2(d.d)}`;const dev=shiftDeviation(si,ds);if(dev&&dev.type==='early'&&dev.level==='danger')earlyExitDays++;});
    if(earlyExitDays>=2)alerts.push({lv:'danger',s,msg:`シフト早退が${earlyExitDays}日（定時より60分以上）`});
    // 翌月シフト希望未提出アラート（提出期限以降）
    if(IS_CURRENT&&REAL_D>=(state.shiftDeadline||20)){
      const nmk=nextMonthKey();const pd=((state.shiftPrefs||{})[nmk]||{})[si];
      if(!pd||!pd.submitted)alerts.push({lv:'warn',s,msg:`${nextMonthLabel()}シフト希望が未提出（締切：今月${state.shiftDeadline||20}日）`});
    }
    // KPI達成率80%未満アラート（月経過30%以上・当月のみ）
    if(IS_CURRENT&&elapsed>=30){
      const lowKpis=KPI_ACT.filter(k=>{const g=gData()[si][k];return g>0&&(sumKpi(si,k)/g*100)<80;});
      if(lowKpis.length>0)alerts.push({lv:'warn',s,msg:`KPI達成率80%未満：${lowKpis.join('・')}`});
    }
  });
  return alerts;
}

/* ===== 労務チェック（残業・休憩・深夜） ===== */
function laborIssues(si){
  const days=getDayLogs(si);
  const toMin=t=>{if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;};
  let overtimeDays=0,longDays=0,shortBreakDays=0,lateNightDays=0,overtimeMin=0;const perDay={};
  days.forEach(d=>{
    if(!d.inT||!d.outT)return;
    const work=calcWorkMin(d.inT,d.outT,d.brkS,d.brkE);
    const brk=(d.brkS&&d.brkE)?(toMin(d.brkE)-toMin(d.brkS)):0;
    const ot=work>480,lng=work>600;
    const needBreak=work>480?60:(work>360?45:0); // 労基：6h超で45分、8h超で60分
    const shortBreak=needBreak>0&&brk<needBreak;
    const lateNight=nightMinutesOf(d.inT,d.outT)>0; // 深夜帯（22時〜翌5時）の労働があるか
    if(ot){overtimeDays++;overtimeMin+=work-480;}
    if(lng)longDays++;
    if(shortBreak)shortBreakDays++;
    if(lateNight)lateNightDays++;
    perDay[d.d]={ot,lng,shortBreak,lateNight};
  });
  return {overtimeDays,longDays,shortBreakDays,lateNightDays,overtimeMin,perDay};
}
// タイムスタンプ表示（M/D HH:MM）
function fmtTs(ms){const d=new Date(ms);return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
// 指定日に承認済み残業があるか（承認時間の合計h）
function approvedOTH(si,dateStr){return state.otRequests.filter(r=>r.si===si&&r.date===dateStr&&r.status==='approved').reduce((a,r)=>a+(parseFloat(r.hours)||0),0);}
// 退勤打刻漏れ日数（過去の完了日で出勤あり・退勤なし）
function missingOutDays(si){const lc=IS_CURRENT?REAL_D-1:DAYS;return getDayLogs(si).filter(d=>d.inT&&!d.outT&&d.d<=lc).length;}

// シフト終業時刻と実際の退勤打刻の乖離を返す
// 戻り値: {diff:分(正=遅い/負=早い), label:表示文字列, level:'warn'|'danger', type:'early'|'late'} | null
// シフト未設定・休み・退勤未打刻・±30分以内は null を返す
function shiftDeviation(si, dateStr){
  const code=(state.shifts[si]||{})[dateStr];
  const st=SHIFT_TYPES.find(t=>t.c===code);
  if(!st||!st.end)return null;
  const parts=dateStr.split('-').map(Number); // [YYYY, MM, DD]
  const dayKey=`${si}_${parts[0]}_${parts[1]}_${parts[2]}`;
  const outLog=state.attLog.find(l=>l.si===si&&l.dateKey===dayKey&&l.type==='out');
  if(!outLog)return null;
  const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
  let schEnd=toMin(st.end);
  let actOut=toMin(outLog.time);
  // 夜勤（nextDay=true）：終業時刻は翌日。実退勤が午前6時未満なら翌日扱い
  if(st.nextDay){schEnd+=1440;if(actOut<360)actOut+=1440;}
  const diff=actOut-schEnd; // 正=遅い(残業超過)、負=早い(早退)
  if(Math.abs(diff)<30)return null; // 30分以内は誤差として無視
  const abs=Math.abs(diff);
  const h=Math.floor(abs/60),m=abs%60;
  const dur=(h?h+'h':'')+m+'m';
  if(diff<0)return {diff,label:`早退 ${dur}`,level:abs>=60?'danger':'warn',type:'early'};
  return {diff,label:`定時超 ${dur}`,level:'warn',type:'late'};
}

function fmt30(totalMs){
  if(!totalMs||totalMs<0)return '—';
  const totalMin=Math.floor(totalMs/60000);
  const h=Math.floor(totalMin/60);const mm=totalMin%60;
  const r30=Math.floor(mm/30)*30;
  return h+'h'+String(mm).padStart(2,'0')+'m ('+h+':'+(r30===0?'00':'30')+')';
}

// 時刻文字列から実働分数を計算（退勤＜出勤＝日跨ぎ夜勤に対応）
function calcWorkMin(inT,outT,brkS,brkE){
  if(!inT||!outT)return 0;
  const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
  let inM=toMin(inT),outM=toMin(outT);
  if(outM<inM)outM+=1440; // 退勤が出勤より前＝翌日にまたがる夜勤
  let work=outM-inM;
  if(brkS&&brkE){let bs=toMin(brkS),be=toMin(brkE);if(be<bs)be+=1440;work-=(be-bs);}
  return Math.max(0,work);
}
// 深夜帯（22:00〜翌05:00）に労働した分数。日跨ぎ夜勤・早朝勤務の両方を拾う
function nightMinutesOf(inT,outT){
  if(!inT||!outT)return 0;
  const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
  let inM=toMin(inT),outM=toMin(outT);if(outM<inM)outM+=1440;
  let night=0;
  [[1320,1740],[-120,300]].forEach(seg=>{const s=Math.max(inM,seg[0]),e=Math.min(outM,seg[1]);if(e>s)night+=e-s;}); // [22:00,翌5:00] と前日[22:00,5:00]
  return night;
}

function fmtWorkMin(min){
  if(min<=0)return '—';
  const h=Math.floor(min/60);const mm=min%60;
  const r30=Math.floor(mm/30)*30;
  return h+'h'+String(mm).padStart(2,'0')+'m ('+h+':'+(r30===0?'00':'30')+')';
}

// 各スタッフの全日打刻を集約して返す
function getDayLogs(si){
  const days=[];
  for(let d=1;d<=LAST_D;d++){ // 当月=今日まで / 過去月=月末まで / 未来月=0（なし）
    const key=`${si}_${Y}_${M+1}_${d}`;
    const dayLog=state.attLog.filter(l=>l.si===si&&l.dateKey===key);
    const inR=dayLog.find(l=>l.type==='in');
    const outR=dayLog.find(l=>l.type==='out');
    const brkS=dayLog.find(l=>l.type==='brk');
    const brkE=dayLog.find(l=>l.type==='ret2');
    days.push({d,inT:inR?inR.time:null,outT:outR?outR.time:null,brkS:brkS?brkS.time:null,brkE:brkE?brkE.time:null});
  }
  return days;
}

/* ===== 給与（出勤実績連動：月給制／時給制） ===== */
// 当月の所定労働日数（平日数）
function workdaysInMonth(y,m){let c=0;const dim=new Date(y,m+1,0).getDate();for(let d=1;d<=dim;d++){const dow=new Date(y,m,d).getDay();if(dow!==0&&dow!==6)c++;}return c;}
// 雇用形態・基本給/時給を用意（初期サンプル：約2/3を月給制の正社員・約1/3を時給制のアルバイト）
function initPayroll(){
  if(!state.payroll)state.payroll={};
  STAFF_LIST.forEach((_,si)=>{if(!state.payroll[si]){const monthly=(si%3!==0);state.payroll[si]=monthly?{type:'monthly',base:rnd(22,33)*10000}:{type:'hourly',base:rnd(1050,1450)};}});
}
function payOf(si){return state.payroll[si]||{type:'hourly',base:1100};}
// 閲覧中の月の給与内訳（打刻実績＋残業＋深夜割増、月給は欠勤日割り控除）
function calcPay(si){
  const p=payOf(si);
  let regMin=0,otMin=0,nightMin=0,workMin=0;
  const days=getDayLogs(si);
  days.forEach(d=>{
    if(!d.inT||!d.outT)return;
    const w=calcWorkMin(d.inT,d.outT,d.brkS,d.brkE);
    workMin+=w;otMin+=Math.max(0,w-480);regMin+=Math.min(w,480);nightMin+=nightMinutesOf(d.inT,d.outT);
  });
  const workDays=days.filter(d=>d.inT&&d.outT).length;
  const absent=absenceDays(si);
  const wd=workdaysInMonth(Y,M)||1;
  const hourly=p.type==='hourly'?p.base:(p.base/(wd*8)); // 月給制の時間単価＝基本給÷(所定労働日数×8h)
  const otPay=Math.round(hourly*1.25*(otMin/60));     // 残業手当（1.25倍）
  const nightPay=Math.round(hourly*0.25*(nightMin/60)); // 深夜割増（+0.25）
  let basePay,deduction;
  if(p.type==='hourly'){basePay=Math.round(hourly*(regMin/60));deduction=0;}
  else{basePay=p.base;deduction=Math.round((p.base/wd)*absent);} // 月給は基本給固定＋欠勤日割り控除
  const total=Math.max(0,basePay-deduction+otPay+nightPay);
  return {type:p.type,base:p.base,workDays,absent,workMin,regMin,otMin,nightMin,hourly,basePay,otPay,nightPay,deduction,total};
}
function exportPayrollCSV(){
  const rows=[['担当者','雇用形態','基本給/時給','出勤日数','欠勤(当月)','実働(h)','残業(h)','深夜(h)','基本','残業手当','深夜手当','欠勤控除','支給額']];
  STAFF_LIST.forEach((s,i)=>{const p=calcPay(i);rows.push([s,p.type==='monthly'?'月給制':'時給制',p.base,p.workDays,p.absent,(p.workMin/60).toFixed(1),(p.otMin/60).toFixed(1),(p.nightMin/60).toFixed(1),p.basePay,p.otPay,p.nightPay,p.deduction,p.total]);});
  rows.push(['支給総額','','','','','','','','','','','',STAFF_LIST.reduce((a,_,i)=>a+calcPay(i).total,0)]);
  downloadCSV('給与_'+Y+'-'+pad2(M+1)+'.csv',rows);
}

  initAuth();          // 認証情報（各スタッフPW・管理者PW）を用意
  initLeave();         // 有給データを用意

  (function(){const p=prevYM();ensurePeriodData(p[0],p[1]);})(); // 前月比トレンド用に前月データを用意

function bindLogin(){
  document.getElementById('l-btn').onclick=()=>{
    const siv=document.getElementById('l-staff').value;
    const pw=document.getElementById('l-pass').value;
    if(!siv){toast('担当者を選択してください','error');return;}
    if(siv==='admin'){
      if(pw!==state.adminPw){toast('パスワードが違います','error');return;}
      state.role='admin';state.user=null;state.page='admin';render();return;
    }
    const si=parseInt(siv);

    if(mustChangePw(si)){ // 月初/初回：パスワード変更を強制

    }
    state.role='staff';state.user=si;state.page='attendance';render();
    // シフト変更通知：次回ログイン時にトースト表示して通知をクリア
    const sn=(state.shiftNotify||{})[si];
    if(sn&&sn.length){
      const msg=sn.map(n=>{const st=SHIFT_TYPES.find(t=>t.c===n.code);return `${n.ds}→${st?st.label:n.code}`;}).join('、');
      setTimeout(()=>toast(`シフト変更通知：${msg}`,'info'),600);

    }

    if(otn&&otn.length){

      setTimeout(()=>toast(`残業申請の結果：${msg}`,'info'),900);
      state.otNotify[si]=[];saveState();
    }
    const lvn=(state.leaveNotify||{})[si];

      const msg=lvn.map(n=>`${n.date}→${n.status==='approved'?'✓ 承認':'✗ 却下'}`).join('、');
      setTimeout(()=>toast(`有給申請の結果：${msg}`,'info'),1200);

  const resetNo=document.getElementById('reset-no');

  const resetYes=document.getElementById('reset-yes');
  if(resetYes)resetYes.onclick=()=>resetData();
}

function bindPeriodNav(){

  const prev=document.getElementById('pn-prev');
  if(prev)prev.onclick=()=>{let m=state.viewMonth-1,y=state.viewYear;if(m<0){m=11;y--;}go(y,m);};

function attendancePage(){
  if(state.role==='admin')return adminAttendanceOverview();

  const todayKey=`${si}_${REAL_Y}_${REAL_M+1}_${REAL_D}`; // 打刻は常に実際の今日
  const log=state.attLog.filter(l=>l.si===si&&l.dateKey===todayKey);
  const status=state.attStatus[si]||'off';
  const labels={off:'未出勤',working:'稼働中',break:'休憩中'};

  // 実働時間：退勤済みなら記録値から、稼働中ならリアルタイムで計算
  let workDisplay='—';
  if(status==='off'&&state.workEndTime[si]!=null&&log.some(l=>l.type==='out')){
    // 退勤済み：本日の退勤打刻がある場合のみ記録された実働時間を表示（前日の残存値を「本日」と誤表示しない）
    workDisplay=fmt30(state.workEndTime[si]);
  } else if(status!=='off'&&state.workStart[si]){
    const ms=Date.now()-state.workStart[si]-(state.totalBreak[si]||0)-(state.breakStart[si]?Date.now()-state.breakStart[si]:0);
    // 20時間超の連続計測＝退勤打刻漏れ（前日からの取り残し）を本日実働として過大表示しない
    workDisplay=ms>20*3600*1000?'退勤打刻が必要です':(ms>60000?fmt30(Math.max(0,ms)):'計測中...');
  }

  // グリーティング表示用
  const gc=state.greetingType?GREETING_COLORS[state.greetingType]:null;
  const greetingHTML=state.greetingMsg&&gc?
    `<div class="greeting-toast show" style="background:${gc.bg};border-color:${gc.border};color:${gc.text}">
      <i class="ti ${gc.icon}" style="font-size:18px;display:block;margin-bottom:4px"></i>${state.greetingMsg}
    </div>`:'<div class="greeting-toast"></div>';

  return `
  ${greetingHTML}
  <div class="grid-2" style="margin-bottom:14px">
    <div class="metric-card">
      <div class="metric-label"><span class="status-dot ${status}"></span>${labels[status]}</div>
      <div class="metric-value" style="font-size:20px">${STAFF_LIST[si]}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">実働時間（本日）</div>
      <div class="metric-value" style="font-size:15px">${workDisplay}</div>
    </div>
  </div>
  <div class="clock-display" id="att-clock">${state.clockStr}</div>
  <div class="confirm-bar" id="confirm-out">
    <i class="ti ti-alert-triangle" style="color:#D85A30;font-size:18px"></i>
    <span style="flex:1;font-size:13px;font-weight:500;color:#993C1D">退勤処理を行いますか？</span>
    <button class="btn btn-sm" id="btn-out-yes" style="background:#D85A30;color:#fff;border-color:#D85A30"><i class="ti ti-check"></i> 退勤する</button>
    <button class="btn btn-sm" id="btn-out-cancel">キャンセル</button>
  </div>
  <div class="attendance-btns">
    <button class="att-btn start" id="btn-in" ${status!=='off'?'disabled':''}><i class="ti ti-login" style="font-size:20px;display:block;margin-bottom:4px"></i>出勤</button>
    <button class="att-btn break" id="btn-brk" ${status!=='working'?'disabled':''}><i class="ti ti-coffee" style="font-size:20px;display:block;margin-bottom:4px"></i>休憩開始</button>
    <button class="att-btn ret" id="btn-ret" ${status!=='break'?'disabled':''}><i class="ti ti-player-play" style="font-size:20px;display:block;margin-bottom:4px"></i>休憩終了</button>
    <button class="att-btn end-btn" id="btn-out" ${status==='off'?'disabled':''}><i class="ti ti-logout" style="font-size:20px;display:block;margin-bottom:4px"></i>退勤</button>
  </div>
  ${(()=>{
    // 退勤打刻漏れ案内：過去日に出勤あり・退勤なしの日があれば表示
    const mo=missingOutDays(si);
    if(mo>=1)return `<div style="background:var(--bg-danger);border:1px solid var(--text-danger);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:10px;font-size:13px">
      <i class="ti ti-alert-circle" style="color:var(--text-danger)"></i> <b>退勤打刻漏れ ${mo}日</b> — 管理者に「打刻修正」を依頼してください。</div>`;
    return '';
  })()}
  <div class="section-title">打刻履歴（本日）</div>
  <div>
    ${log.length===0?'<p class="tip" style="padding:10px 0">まだ打刻がありません</p>':
      log.map(l=>`<div class="tl-item">
        <div class="tl-dot ${l.type}"></div>
        <div class="tl-time">${l.time}</div>
        <div>${{in:'出勤',out:'退勤',brk:'休憩開始',ret2:'休憩終了'}[l.type]}</div>
      </div>`).join('')}
  </div>${attExtraHTML(si)}`;
}

// 打刻ページ下部：本日のシフト＋残業申請
function nextMonthKey(){const nm=new Date(REAL_Y,REAL_M+1,1);return `${nm.getFullYear()}_${nm.getMonth()}`;}
function nextMonthLabel(){const nm=new Date(REAL_Y,REAL_M+1,1);return `${nm.getFullYear()}年${nm.getMonth()+1}月`;}
function nextMonthDays(){const nm=new Date(REAL_Y,REAL_M+1,1);return new Date(nm.getFullYear(),nm.getMonth()+1,0).getDate();}
function nextMonthYear(){return new Date(REAL_Y,REAL_M+1,1).getFullYear();}
function nextMonthM(){return new Date(REAL_Y,REAL_M+1,1).getMonth()+1;}

function shiftPrefCardHTML(si){
  const nmk=nextMonthKey(),nml=nextMonthLabel(),nmd=nextMonthDays(),nmy=nextMonthYear(),nmm=nextMonthM();
  const prefData=((state.shiftPrefs||{})[nmk]||{})[si];
  const submitted=prefData&&prefData.submitted;
  const days=(prefData&&prefData.days)||{};
  const deadlinePassed=REAL_D>(state.shiftDeadline||20);
  const stChip={pending:{t:'承認待ち',bg:'var(--bg-warning)',c:'var(--text-warning)'},approved:{t:'承認',bg:'var(--bg-success)',c:'var(--text-success)'},rejected:{t:'却下',bg:'var(--bg-danger)',c:'var(--text-danger)'}};
  const myChangeReqs=(state.shiftChangeReqs||[]).filter(r=>r.si===si).slice(-8).reverse();

  const calRows=Array.from({length:nmd},(_,idx)=>{
    const d=idx+1,ds=`${nmy}-${pad2(nmm)}-${pad2(d)}`;
    const dow=['日','月','火','水','木','金','土'][new Date(nmy,nmm-1,d).getDay()];
    const isWE=new Date(nmy,nmm-1,d).getDay()===0||new Date(nmy,nmm-1,d).getDay()===6;
    const saved=days[ds]; // {start,end} or null(=絶対休み) or undefined(=未設定=休み扱い)
    const startVal=saved===null?'off':(saved?saved.start:'');
    const endVal=saved&&saved.end?saved.end:'18:00';
    if(submitted){
      const endDisp=saved&&saved.end<saved.start?'翌'+saved.end:saved&&saved.end;
      const disp=saved===null?`<span class="chip" style="background:#fcebeb;color:#A32D2D;font-size:12px">🔴 絶対休み</span>`:
        saved?`<span style="font-size:13px;font-family:var(--font-mono)">${saved.start}〜${endDisp}</span>`:
        `<span style="color:var(--text-tertiary);font-size:12px">—（休み扱い）</span>`;
      return `<tr style="${isWE?'background:#fafafa':''}"><td style="width:30px;text-align:center;font-family:var(--font-mono);font-size:13px">${d}</td><td style="width:22px;text-align:center;font-size:12px;color:${isWE?'#A32D2D':'var(--text-secondary)'}">${dow}</td><td>${disp}</td></tr>`;

      </div>

  }).join('');

  const prefCard=`
  <div class="card" style="margin-top:14px">
    <div class="section-title" style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
      <span><i class="ti ti-calendar-event"></i> シフト希望提出 <span class="tip" style="margin-left:4px">${nml}分 / 締切：今月${state.shiftDeadline||20}日まで</span></span>
      ${submitted?`<span class="chip" style="background:var(--bg-success);color:var(--text-success)"><i class="ti ti-check"></i> 提出済</span>`:
        deadlinePassed?`<span class="chip" style="background:var(--bg-danger);color:var(--text-danger)"><i class="ti ti-alert-triangle"></i> 期限超過</span>`:''}
    </div>
    ${submitted?`<p class="tip" style="margin-bottom:10px">提出済みです（${new Date(prefData.submittedAt).toLocaleDateString('ja-JP')}）。内容変更はシフト修正依頼からお願いします。</p>`:''}
    <div class="kpi-table-wrap"><table class="att-list" style="max-width:520px">
      <thead><tr><th style="width:30px">日</th><th style="width:22px">曜</th><th>出勤時間 / 退勤時間</th></tr></thead>
      <tbody>${calRows}</tbody>
    </table></div>
    ${!submitted?`<div style="margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" id="shiftpref-submit"><i class="ti ti-send"></i> ${nml}のシフト希望を提出する</button>
      ${deadlinePassed?`<span class="tip" style="color:var(--text-warning)"><i class="ti ti-alert-triangle"></i> 締切（${state.shiftDeadline||20}日）を過ぎています</span>`:''}
    </div>`:''}
  </div>`;

  const chgCard=`
  <div class="card" style="margin-top:14px">
    <div class="section-title"><i class="ti ti-calendar-edit"></i> シフト修正依頼 <span class="tip" style="margin-left:4px">当月確定シフトの変更を管理者に依頼</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
      <div><div class="form-label">対象日</div><input type="date" class="form-control" id="shiftchg-date" value="${REAL_Y}-${pad2(REAL_M+1)}-${pad2(REAL_D)}" style="max-width:160px"></div>
      <div><div class="form-label">出勤時間</div><select class="form-control" id="shiftchg-start" style="min-width:110px">
        <option value="off">🔴 休み希望</option>
        ${timeOpts('09:00',6,24)}
      </select></div>
      <div id="shiftchg-end-wrap"><div class="form-label">退勤時間</div><select class="form-control" id="shiftchg-end" style="min-width:110px">
        ${timeOpts('18:00',6,30)}
      </select></div>
      <div style="flex:1;min-width:160px"><div class="form-label">理由</div><input type="text" class="form-control" id="shiftchg-reason" placeholder="例：家庭の都合"></div>
      <button class="btn btn-primary" id="shiftchg-submit"><i class="ti ti-send"></i> 依頼</button>
    </div>
    ${myChangeReqs.length?`<table class="att-list"><thead><tr><th>対象日</th><th>希望時間帯</th><th>理由</th><th>状態</th></tr></thead>
      <tbody>${myChangeReqs.map(r=>{const c=stChip[r.status];const slot=r.start==='off'?'🔴 休み希望':`${r.start}〜${r.end}`;return `<tr><td>${esc(r.date)}</td><td>${slot}</td><td>${esc(r.reason)}</td><td><span class="chip" style="background:${c.bg};color:${c.c}">${c.t}</span></td></tr>`;}).join('')}</tbody></table>`:'<p class="tip">まだ依頼はありません</p>'}
  </div>`;

  return prefCard+chgCard;
}

function bindAttendance(){
  const si=state.user;
  const todayKey=`${si}_${REAL_Y}_${REAL_M+1}_${REAL_D}`; // 打刻は常に実際の今日

  const punch=(type)=>{
    const now=new Date();
    const timeStr=[now.getHours(),now.getMinutes()].map(x=>String(x).padStart(2,'0')).join(':');
    // 日跨ぎ夜勤：本日まだ出勤しておらず、前日に未退勤の出勤がある場合は退勤を前日扱いで記録
    let logKey=todayKey,logD=REAL_D;
    if(type==='out'&&!state.attLog.some(l=>l.si===si&&l.dateKey===todayKey&&l.type==='in')){
      const py=new Date(REAL_Y,REAL_M,REAL_D-1);const pk=`${si}_${py.getFullYear()}_${py.getMonth()+1}_${py.getDate()}`;
      if(state.attLog.some(l=>l.si===si&&l.dateKey===pk&&l.type==='in')&&!state.attLog.some(l=>l.si===si&&l.dateKey===pk&&l.type==='out')){logKey=pk;logD=py.getDate();}
    }
    state.attLog.push({si,type,time:timeStr,dateKey:logKey,dateD:logD});

    if(type==='in'){
      state.attStatus[si]='working';
      state.workStart[si]=Date.now();
      state.totalBreak[si]=0;
      state.breakStart[si]=null;
      state.workEndTime[si]=null;
    }
    if(type==='brk'){
      state.attStatus[si]='break';
      state.breakStart[si]=Date.now();
    }
    if(type==='ret2'){
      state.attStatus[si]='working';
      if(state.breakStart[si]){state.totalBreak[si]=(state.totalBreak[si]||0)+(Date.now()-state.breakStart[si]);}
      state.breakStart[si]=null;
    }
    if(type==='out'){
      // 退勤時に実働時間を確定記録
      const ms=state.workStart[si]?(Date.now()-state.workStart[si]-(state.totalBreak[si]||0)):0;
      state.workEndTime[si]=Math.max(0,ms);
      state.attStatus[si]='off';
      state.workStart[si]=null;
      state.breakStart[si]=null;
    }

    // グリーティングメッセージ
    state.greetingMsg=GREETINGS[type](STAFF_LIST[si]);
    state.greetingType=type;

    render();

    // 5秒後にグリーティングを消す
    setTimeout(()=>{
      state.greetingMsg=null;
      state.greetingType=null;
      const el=document.querySelector('.greeting-toast');
      if(el){el.style.opacity='0';el.style.transition='opacity .5s';setTimeout(()=>{el.style.display='none';},500);}
    },5000);
  };

  document.getElementById('btn-in').onclick=()=>punch('in');
  document.getElementById('btn-brk').onclick=()=>punch('brk');
  document.getElementById('btn-ret').onclick=()=>punch('ret2');

  // 退勤：confirmを使わずインライン確認バーを表示
  document.getElementById('btn-out').onclick=()=>{
    const bar=document.getElementById('confirm-out');
    if(bar){bar.classList.add('show');}
  };
  const yesBtn=document.getElementById('btn-out-yes');
  if(yesBtn)yesBtn.onclick=()=>punch('out');
  const cancelBtn=document.getElementById('btn-out-cancel');
  if(cancelBtn)cancelBtn.onclick=()=>{
    const bar=document.getElementById('confirm-out');
    if(bar)bar.classList.remove('show');
  };
  // 残業申請 理由セレクト
  const otReasonSel=document.getElementById('ot-reason');
  if(otReasonSel)otReasonSel.onchange=()=>{
    const other=document.getElementById('ot-reason-other');
    if(other)other.style.display=otReasonSel.value==='__other__'?'':'none';
  };
  const lvReasonSel=document.getElementById('lv-reason');
  if(lvReasonSel)lvReasonSel.onchange=()=>{
    const other=document.getElementById('lv-reason-other');
    if(other)other.style.display=lvReasonSel.value==='__other__'?'':'none';
  };
  // 残業申請
  const otBtn=document.getElementById('ot-submit');
  if(otBtn)otBtn.onclick=()=>{
    const date=document.getElementById('ot-date').value;
    const hours=parseFloat(document.getElementById('ot-hours').value);
    const startTime=document.getElementById('ot-start').value;
    const endTime=document.getElementById('ot-end').value;
    const sel=document.getElementById('ot-reason');
    const reason=sel&&sel.value==='__other__'?(document.getElementById('ot-reason-other').value||'').trim():(sel&&sel.value||'');
    if(!date||!hours||hours<=0){toast('対象日と残業時間を入力してください','error');return;}
    if(!reason){toast('理由を選択してください','error');return;}
    state.otRequests.push({id:Date.now()+'_'+si,si,date,hours,startTime,endTime,reason,status:'pending',by:null});
    toast('残業申請を送信しました（承認待ち）','success');render();
  };
  // 有給申請
  const lvBtn=document.getElementById('lv-submit');
  if(lvBtn)lvBtn.onclick=()=>{
    const date=document.getElementById('lv-date').value;
    const lvSel=document.getElementById('lv-reason');
    const reason=lvSel&&lvSel.value==='__other__'?(document.getElementById('lv-reason-other').value||'').trim():(lvSel&&lvSel.value||'');
    if(!date){toast('取得希望日を入力してください','error');return;}
    const lv=leaveOf(si);const remaining=Math.max(0,(lv.granted||0)-(lv.taken||[]).length);
    if(remaining<=0){toast('有給残日数が不足しています','error');return;}
    const dup=(state.leaveRequests||[]).find(r=>r.si===si&&r.date===date&&r.status==='pending');
    if(dup){toast('同じ日付の申請がすでに承認待ちです','error');return;}
    if(!state.leaveRequests)state.leaveRequests=[];
    state.leaveRequests.push({id:Date.now()+'_'+si,si,date,reason,status:'pending',by:null});
    toast('有給申請を送信しました（承認待ち）','success');render();
  };
  // --- シフト希望提出 ---
  const prefBtn=document.getElementById('shiftpref-submit');
  if(prefBtn)prefBtn.onclick=()=>{
    const nmk=nextMonthKey();
    if(!state.shiftPrefs)state.shiftPrefs={};
    if(!state.shiftPrefs[nmk])state.shiftPrefs[nmk]={};
    const days={};
    let valid=true;
    document.querySelectorAll('[data-shiftpref-start]').forEach(startSel=>{
      const ds=startSel.dataset.shiftprefStart;
      const endSel=document.querySelector(`[data-shiftpref-end="${ds}"]`);
      if(startSel.value==='off'){days[ds]=null;} // 絶対休み
      else if(startSel.value){
        if(!endSel||!endSel.value){valid=false;return;}
        days[ds]={start:startSel.value,end:endSel.value};
      }
      // 空欄は登録しない（休み扱い）
    });
    if(!valid){toast('出勤希望の日は退勤時間も選択してください','error');return;}
    state.shiftPrefs[nmk][si]={submitted:true,submittedAt:Date.now(),days};
    toast(nextMonthLabel()+'のシフト希望を提出しました','success');render();
  };
  // --- シフト希望：出勤時間変更→退勤プルダウン表示切替 ---
  document.querySelectorAll('[data-shiftpref-start]').forEach(startSel=>{
    const ds=startSel.dataset.shiftprefStart;
    const endSel=document.querySelector(`[data-shiftpref-end="${ds}"]`);
    if(!endSel)return;
    startSel.onchange=()=>{endSel.style.display=startSel.value&&startSel.value!=='off'?'inline-block':'none';};
  });
  // --- シフト修正依頼 ---
  const chgBtn=document.getElementById('shiftchg-submit');
  if(chgBtn)chgBtn.onclick=()=>{
    const date=document.getElementById('shiftchg-date').value;
    const chgStartEl=document.getElementById('shiftchg-start');
    const chgEndEl=document.getElementById('shiftchg-end');
    const chgStartVal=chgStartEl?chgStartEl.value:'';
    const chgEndVal=chgEndEl?chgEndEl.value:'';
    const reason=(document.getElementById('shiftchg-reason').value||'').trim();
    if(!date){toast('対象日を入力してください','error');return;}
    if(!reason){toast('理由を入力してください','error');return;}
    const isOff=chgStartVal==='off';
    if(!isOff&&!chgEndVal){toast('退勤時間を選択してください','error');return;}
    const start=isOff?'off':chgStartVal;
    const end=isOff?'off':chgEndVal;
    const code=isOff?'休':'';
    const dup=(state.shiftChangeReqs||[]).find(r=>r.si===si&&r.date===date&&r.status==='pending');
    if(dup){toast('同じ日付の修正依頼がすでに承認待ちです','error');return;}
    if(!state.shiftChangeReqs)state.shiftChangeReqs=[];
    state.shiftChangeReqs.push({id:Date.now()+'_'+si,si,date,start,end,code,reason,status:'pending',by:null,createdAt:Date.now()});
    toast('シフト修正依頼を送信しました（承認待ち）','success');render();
  };
  // --- シフト修正依頼：出勤時間変更→退勤プルダウン表示切替 ---
  const chgStartSel=document.getElementById('shiftchg-start');
  const chgEndWrap=document.getElementById('shiftchg-end-wrap');
  if(chgStartSel&&chgEndWrap){
    const toggleChgEnd=()=>{chgEndWrap.style.display=chgStartSel.value==='off'?'none':'';};
    toggleChgEnd();
    chgStartSel.onchange=toggleChgEnd;
  }
}

function histDailyContent(si){
  if(si==='total'){

    const rows=STAFF_LIST.map((s,i)=>{
      const days=getDayLogs(i);
      const workDays=days.filter(d=>d.inT).length;

      return {name:s,workDays,totalMin,absent:absenceDays(i)};
    });
    const teamTotal=rows.reduce((a,r)=>a+r.totalMin,0);
    return `
    <div class="card">
      <div class="section-title">全スタッフ 出勤サマリー（${LAST_D}日時点）</div>
      <table class="att-list">
        <thead><tr><th>担当者</th><th>出勤日数</th><th>欠勤</th><th>総実働時間</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td>${r.name}</td>

            <td style="font-family:var(--font-mono)">${fmtWorkMin(teamTotal)}</td>
          </tr>
        </tfoot>
      </table>
    </div>`;
  }

  const days=getDayLogs(si);
  const workDays=days.filter(d=>d.inT).length;

  const totalMin=days.reduce((acc,d)=>acc+calcWorkMin(d.inT,d.outT,d.brkS,d.brkE),0);
  const lab=laborIssues(si); // 労務フラグ（残業・休憩不足・深夜）

  return `
  <div class="grid-3" style="margin-bottom:14px">
    <div class="metric-card"><div class="metric-label">出勤日数</div><div class="metric-value" style="color:#185FA5">${workDays}日</div></div>
    <div class="metric-card"><div class="metric-label">欠勤・未出勤</div><div class="metric-value" style="color:#D85A30">${absentDays}日</div></div>
    <div class="metric-card"><div class="metric-label">月間総実働</div><div class="metric-value" style="font-size:16px">${fmtWorkMin(totalMin)}</div></div>
  </div>
  <div class="card">
    <div class="section-title">日別打刻一覧</div>
    ${[...days].reverse().map(day=>{
      const hasLog=day.inT;
      const workMin=calcWorkMin(day.inT,day.outT,day.brkS,day.brkE);
      const dow=['日','月','火','水','木','金','土'][(new Date(Y,M,day.d)).getDay()];
      const isToday=day.d===TODAY_D;
      const isSun=(new Date(Y,M,day.d)).getDay()===0;
      const isSat=(new Date(Y,M,day.d)).getDay()===6;
      const ds=`${Y}-${pad2(M+1)}-${pad2(day.d)}`;
      const isLeave=(leaveOf(si).taken||[]).includes(ds);
      return `<div class="hist-row" style="${isToday?'background:#f0f7ff;border-radius:8px;padding:10px 8px;':''}">
        <div class="hist-date" style="color:${isSun?'#D85A30':isSat?'#185FA5':'var(--text-secondary)'}">${String(day.d).padStart(2,'0')}<span style="font-size:10px;margin-left:2px">${dow}</span></div>
        <div class="hist-times">
          ${hasLog?`<span><i class="ti ti-login" style="color:#1D9E75;font-size:13px"></i> ${day.inT}</span>
            ${day.brkS?`<span><i class="ti ti-coffee" style="color:#BA7517;font-size:13px"></i> ${day.brkS}〜${day.brkE||'?'}</span>`:''}

              if(f.ot){const lbl=(f.lng?'長時間':'残業')+(appr?'(承認)':'(未承認)');b.push(appr?`<span class="chip" style="background:var(--bg-success);color:var(--text-success)">${lbl}</span>`:`<span class="chip" style="background:var(--bg-warning);color:var(--text-warning);cursor:pointer" data-ot-apply="${ds}" title="クリックして申請"><i class="ti ti-send" style="font-size:10px"></i> ${lbl}</span>`);}
              if(f.shortBreak)b.push('<span class="chip" style="background:var(--bg-danger);color:var(--text-danger)">休憩不足</span>');
              if(f.lateNight)b.push('<span class="chip" style="background:var(--bg-warning);color:var(--text-warning)">深夜</span>');}
              const dev=shiftDeviation(si,ds);if(dev){const c=dev.level==='danger'?'var(--bg-danger)':'var(--bg-warning)';const tc=dev.level==='danger'?'var(--text-danger)':'var(--text-warning)';b.push(`<span class="chip" style="background:${c};color:${tc}">${dev.label}</span>`);}
              return b.join(' ');})()}`
            :`${isLeave?'<span class="chip" style="background:#E8F5E9;color:#2E7D32;font-size:11px"><i class="ti ti-calendar-heart" style="font-size:11px"></i> 休暇 / 有給</span>':''}${isToday?'<span style="color:var(--text-tertiary)">（本日稼働中）</span>':isSun||isSat?'<span style="color:var(--text-tertiary)">休日</span>':isLeave?'':(state.role!=='admin'?`<span class="chip" style="background:var(--bg-danger);color:var(--text-danger);cursor:pointer;font-size:11px" data-lv-apply="${ds}" title="クリックして有給申請"><i class="ti ti-calendar-plus" style="font-size:11px"></i> 欠勤 / 有給申請</span>`:'<span style="color:var(--text-tertiary)">欠勤 / 休暇</span>')}`}
        </div>
        <div class="hist-work" style="color:${hasLog&&workMin>0?'var(--text-primary)':'var(--text-tertiary)'}">${fmtWorkMin(workMin)}</div>
        ${isToday?'<span style="font-size:10px;padding:2px 7px;background:#E6F1FB;color:#185FA5;border-radius:10px;font-weight:600">本日</span>':''}
      </div>`;
    }).join('')}
  </div>`;
}

function histTotalContent(si){
  if(si==='total'){
    // チーム全員の総合
    const rows=STAFF_LIST.map((s,i)=>{
      const days=getDayLogs(i);
      const totalMin=days.reduce((acc,d)=>acc+calcWorkMin(d.inT,d.outT,d.brkS,d.brkE),0);
      const workDays=days.filter(d=>d.inT&&d.outT).length;
      const avgMin=workDays>0?Math.round(totalMin/workDays):0;
      return {name:s,totalMin,workDays,avgMin};
    });
    const maxMin=Math.max(...rows.map(r=>r.totalMin),1);
    return `<div class="card">
      <div class="section-title">チーム全員 総実働時間ランキング</div>
      ${[...rows].sort((a,b)=>b.totalMin-a.totalMin).map((r,i)=>{
        const medals=['🥇','🥈','🥉'];
        const pct=Math.round(r.totalMin/maxMin*100);
        return `<div class="team-row">
          <div class="rank-num">${i<3?medals[i]:(i+1)}</div>
          <div style="width:80px;font-size:12px">${r.name.split(' ')[0]}</div>
          <div class="rank-bar"><div class="rank-fill" style="width:${pct}%;background:#185FA5"></div></div>
          <div style="width:120px;font-size:11px;font-family:var(--font-mono);text-align:right;font-weight:600">${fmtWorkMin(r.totalMin)}</div>
          <div class="tip" style="width:60px;text-align:right">平均${fmtWorkMin(r.avgMin).split('(')[0].trim()}/日</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // 個人の総合
  const days=getDayLogs(si);
  const totalMin=days.reduce((acc,d)=>acc+calcWorkMin(d.inT,d.outT,d.brkS,d.brkE),0);
  const workDays=days.filter(d=>d.inT&&d.outT).length;
  const avgMin=workDays>0?Math.round(totalMin/workDays):0;
  const targetMin=workDays*8*60; // 8h/日 が目標

  const byWeek=[];
  days.forEach(d=>{
    const dt=new Date(Y,M,d.d);
    const weekNum=Math.floor((d.d-1)/7);
    if(!byWeek[weekNum])byWeek[weekNum]={label:`第${weekNum+1}週`,totalMin:0,days:0};
    const wm=calcWorkMin(d.inT,d.outT,d.brkS,d.brkE);
    byWeek[weekNum].totalMin+=wm;
    if(wm>0)byWeek[weekNum].days++;
  });

  return `
  <div class="grid-3" style="margin-bottom:14px">
    <div class="metric-card"><div class="metric-label">月間総実働</div><div class="metric-value" style="font-size:16px;color:#185FA5">${fmtWorkMin(totalMin)}</div></div>
    <div class="metric-card"><div class="metric-label">1日平均実働</div><div class="metric-value" style="font-size:16px">${fmtWorkMin(avgMin)}</div></div>
    <div class="metric-card"><div class="metric-label">出勤日数</div><div class="metric-value">${workDays}日</div></div>
  </div>
  <div class="card">
    <div class="section-title">週別実働時間</div>
    ${byWeek.filter(Boolean).map(w=>{
      const pct=Math.min(100,Math.round(w.totalMin/(5*8*60)*100));
      const col=pct>=90?'#1D9E75':pct>=70?'#BA7517':'#185FA5';
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:50px;font-size:12px;font-weight:600">${w.label}</div>
        <div style="flex:1"><div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div></div>
        <div style="font-size:12px;font-family:var(--font-mono);width:120px;text-align:right;font-weight:600">${fmtWorkMin(w.totalMin)}</div>
        <div class="tip" style="width:40px;text-align:right">${w.days}日</div>
      </div>`;
    }).join('')}
    <div class="total-row" style="margin-top:12px">
      <i class="ti ti-sigma" style="font-size:18px;color:#185FA5"></i>
      <div style="font-weight:700;font-size:14px">月間合計</div>
      <div style="font-family:var(--font-mono);font-weight:700;font-size:15px;color:#185FA5;margin-left:auto">${fmtWorkMin(totalMin)}</div>
    </div>
  </div>`;
}

function showOtApplyModal(ds){
  const existing=document.getElementById('ot-apply-modal');if(existing)existing.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="ot-apply-modal" style="z-index:300">
    <div class="modal" style="max-width:400px">
      <div class="modal-title"><i class="ti ti-clock-plus"></i> 残業申請</div>
      <p style="margin-bottom:16px;font-size:13px"><b>${ds}</b> の残業はまだ申請されていません。<br>申請ページへ移動して申請しますか？</p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" id="ot-modal-cancel">閉じる</button>
        <button class="btn btn-primary" id="ot-modal-go"><i class="ti ti-send"></i> 申請する</button>
      </div>
    </div>
  </div>`);
  const ov=document.getElementById('ot-apply-modal');
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.getElementById('ot-modal-cancel').onclick=()=>ov.remove();
  document.getElementById('ot-modal-go').onclick=()=>{
    ov.remove();
    state._prefillOtDate=ds;
    state.page='attendance';
    render();
    setTimeout(()=>{const el=document.getElementById('ot-date');if(el)el.closest('.card').scrollIntoView({behavior:'smooth',block:'start'});},150);
  };
}

  document.querySelectorAll('[data-htab]').forEach(el=>{el.onclick=()=>{state.histTab=el.dataset.htab;render();};});
  const el=document.getElementById('hist-staff');

    render();
    setTimeout(()=>{const lel=document.getElementById('lv-date');if(lel)lel.closest('.card').scrollIntoView({behavior:'smooth',block:'start'});},150);
  };});
}

// 横長KPI表で「今日」列が画面外に隠れないよう、表示位置へ自動スクロール（当月のみ）
function scrollKpiToToday(){
  if(!IS_CURRENT)return;
  const wrap=document.querySelector('.kpi-table-wrap');if(!wrap)return;
  const cell=wrap.querySelector('td.today, th[style*="dceeff"]');if(!cell)return;
  const target=cell.offsetLeft-wrap.clientWidth/2+cell.offsetWidth/2;
  wrap.scrollLeft=Math.max(0,target);
}

  const addBtn=document.getElementById('add-slot');
  if(addBtn)addBtn.onclick=()=>{
    const inp=document.getElementById('new-slot-time');
    const t=inp?inp.value:''; // type=time は "HH:MM"（24時間・ゼロ埋め）
    if(!t){toast('追加する時刻を入力してください','error');return;}
    if(state.timeSlots.includes(t)){toast('すでに登録されている時刻です','error');return;}
    state.timeSlots=[...state.timeSlots,t].sort();render();
  };
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick=()=>{state.timeSlots.splice(parseInt(btn.dataset.del),1);render();};
  });
  document.querySelectorAll('[data-tskey]').forEach(inp=>{
    inp.oninput=e=>{
      tData()[e.target.dataset.tskey]=parseInt(e.target.value)||0;
      const row=e.target.closest('tr');
      if(row){
        const inputs=[...row.querySelectorAll('input[type=number]')];
        const sum=inputs.reduce((a,el)=>a+(parseInt(el.value)||0),0);
        const totalCell=row.querySelector('.total');
        if(totalCell){
          totalCell.textContent=sum;
          const kMonthly=parseInt(row.dataset.kmonthly||0);
          totalCell.style.color=sum===kMonthly?'#2E7D32':'#C62828';
          totalCell.style.fontWeight='700';
        }
      }
      saveStateDebounced();
    };
  });
}

/* ===== REPORT ===== */
function buildReportText(scope,fmt){
  const isDay=(state.reportPeriod||'day')==='day';
  const day=Math.min(state.reportDay||REAL_D,DAYS); // 閲覧中の月内の指定日
  const mo=M+1;
  const repSi=typeof state.reportStaff==='number'?state.reportStaff:0;
  const periodLabel=isDay?`${mo}/${day}`:`${Y}年${mo}月`;
  const gl=isDay?'日割り目標比':'目標比';
  // 値：日次=その日の値 / 月次=月合計
  const vInd=(si,k)=>isDay?((kData()[si][day]&&kData()[si][day][k])||0):sumKpi(si,k);
  const vTeam=k=>isDay?STAFF_LIST.reduce((a,_,i)=>a+((kData()[i][day]&&kData()[i][day][k])||0),0):sumKpiAll(k);
  // 目標：日次=日割り(月目標/日数) / 月次=月目標
  const gInd=(si,k)=>{const g=gData()[si][k]||0;return isDay?Math.max(1,Math.round(g/DAYS)):(g||1);};
  const gTeam=k=>{const g=STAFF_LIST.reduce((_,__,i)=>_+(gData()[i][k]||0),0);return isDay?Math.max(1,Math.round(g/DAYS)):(g||1);};
  const contractOf=i=>isDay?((kData()[i][day]&&kData()[i][day]['契約数'])||0):sumKpi(i,'契約数');
  if(scope==='individual'){
    const head=`${isDay?'日次':'月次'}KPI報告`;
    const lines=state.reportKpis.map(k=>{const v=vInd(repSi,k);const p=Math.round(v/gInd(repSi,k)*100);return{k,v,p};});
    if(fmt==='plain')return `【${head}】${periodLabel}\n担当：${STAFF_LIST[repSi]}\n${'─'.repeat(22)}\n`+lines.map(l=>`${l.k}：${l.v}件 (${gl} ${l.p}%)`).join('\n')+`\n${'─'.repeat(22)}\n以上`;
    return `*【${head}】${periodLabel}*\n担当：*${STAFF_LIST[repSi]}*\n`+lines.map(l=>`> ${l.k}：*${l.v}件* ${l.p>=100?':white_check_mark:':':warning:'} ${l.p}%`).join('\n')+'\n_以上_';
  }
  const head=`チーム${isDay?'日次':'月次'}集計`;
  const lines=state.reportKpis.map(k=>{const v=vTeam(k);const p=Math.round(v/gTeam(k)*100);return{k,v,p};});
  if(fmt==='plain')return `【${head}】${periodLabel}\nメンバー：${STAFF_LIST.length}名\n${'─'.repeat(24)}\n`+lines.map(l=>`${l.k}：${l.v}件 (チーム${gl} ${l.p}%)`).join('\n')+`\n${'─'.repeat(24)}\n`+STAFF_LIST.map((s,i)=>`  ${s}：契約${contractOf(i)}件`).join('\n')+`\n${'─'.repeat(24)}\n以上`;
  return `*【${head}】${periodLabel}* 👥 ${STAFF_LIST.length}名\n`+lines.map(l=>`> ${l.k}：*${l.v}件* ${l.p>=100?':white_check_mark:':':warning:'} ${l.p}%`).join('\n')+'\n\n*個人別契約数*\n'+STAFF_LIST.map((s,i)=>`> ${s}：*${contractOf(i)}件*`).join('\n')+'\n_以上_';
}

function bindDashboard(){
  const dashSt=document.getElementById('dash-staff');
  if(dashSt)dashSt.onchange=e=>{
    const v=e.target.value;
    state.dashStaff=v==='total'?'total':parseInt(v);
    render();
  };
  document.querySelectorAll('[data-dkpi]').forEach(el=>{el.onclick=()=>{state.dashKpi=el.dataset.dkpi;render();};});

  // フィードバックコメント投稿
  const cmtPost=document.getElementById('cmt-post');
  if(cmtPost)cmtPost.onclick=()=>{
    const si=state.role==='admin'?state.dashStaff:state.user;if(si==='total')return;
    const inp=document.getElementById('cmt-input');const t=(inp.value||'').trim();
    if(!t){toast('コメントを入力してください','error');return;}
    if(!state.comments[si])state.comments[si]=[];
    state.comments[si].push({by:state.role==='admin'?'管理者':(STAFF_LIST[state.user]||''),role:state.role,t:Date.now(),text:t});
    render();
  };
  // 1on1記録（管理者のみフォーム表示）
  const o1Add=document.getElementById('o1-add');
  if(o1Add)o1Add.onclick=()=>{
    const si=state.role==='admin'?state.dashStaff:state.user;if(si==='total')return;
    const date=document.getElementById('o1-date').value;const note=(document.getElementById('o1-note').value||'').trim();const action=(document.getElementById('o1-action').value||'').trim();
    if(!date||!note){toast('日付とメモを入力してください','error');return;}
    if(!state.oneOnOne[si])state.oneOnOne[si]=[];
    state.oneOnOne[si].push({date,note,action});
    state.oneOnOne[si].sort((a,b)=>a.date<b.date?-1:1);
    toast('1on1を記録しました','success');render();
  };

  // チャート初期描画
  const drawChart=()=>{
    const canvas=document.getElementById('dash-chart');if(!canvas)return;
    const si=state.role==='admin'?state.dashStaff:state.user;const kpi=state.dashKpi;
    const isTotal=state.role==='admin'&&si==='total';
    const days=Array.from({length:DAYS},(_,i)=>i+1);
    const vals=isTotal
      ?days.map(d=>STAFF_LIST.reduce((a,_,i)=>a+(kData()[i][d][kpi]||0),0))
      :days.map(d=>kData()[si][d][kpi]||0);
    const goal=isTotal
      ?STAFF_LIST.reduce((_,__,i)=>_+(gData()[i][kpi]||0),0)||1
      :gData()[si][kpi]||1;
    if(state.dashChart)state.dashChart.destroy();
    state.dashChart=new Chart(canvas,{type:'line',data:{labels:days,datasets:[
      {label:'実績',data:vals,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.07)',fill:true,tension:.3,pointRadius:2,pointHoverRadius:5,pointBackgroundColor:'#185FA5'},
      {label:'目標ペース',data:days.map(()=>Math.round(goal/DAYS)),borderColor:'#aaa',borderDash:[5,5],fill:false,pointRadius:0,tension:0}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>`${i[0].label}日`}}},
      scales:{x:{ticks:{autoSkip:true,maxTicksLimit:12}},y:{beginAtZero:true}}}});
    state._dashDrawChart=drawChart; // 更新用に保持
  };
  setTimeout(drawChart,80);

  // ===== リアルタイム入力処理 =====
  document.querySelectorAll('[data-rt-si]').forEach(inp=>{
    inp.oninput=e=>{
      const si=parseInt(e.target.dataset.rtSi);
      const kpi=e.target.dataset.rtKpi;
      const val=parseInt(e.target.value)||0;

      // stateを更新
      kData()[si][TODAY_D][kpi]=val;

      // --- サマリーカード更新 ---
      const selKpi=state.dashKpi;
      const newTot=sumKpi(si,selKpi);
      const newGoal=gData()[si][selKpi]||1;
      const newPct=Math.round(newTot/newGoal*100);
      const newCol=newPct>=100?'#1D9E75':newPct>=70?'#BA7517':'#D85A30';
      const totEl=document.getElementById('dash-total');
      const pctEl=document.getElementById('dash-pct');
      if(totEl)totEl.textContent=newTot;
      if(pctEl){pctEl.textContent=newPct+'%';pctEl.style.color=newCol;}

      // --- 変更KPIの進捗バー更新 ---
      const id=kpi.replace(/[^\w]/g,'_');
      const newT=sumKpi(si,kpi);
      const newG=gData()[si][kpi]||1;
      const newP=Math.min(100,Math.round(newT/newG*100));
      const newC=newP>=100?'#1D9E75':newP>=70?'#BA7517':'#D85A30';
      const prog=document.getElementById(`dash-prog-${id}`);
      const pctBar=document.getElementById(`dash-pct-${id}`);
      const valBar=document.getElementById(`dash-val-${id}`);
      if(prog){prog.style.width=newP+'%';prog.style.background=newC;}
      if(pctBar){pctBar.textContent=newP+'%';pctBar.style.color=newC;}
      if(valBar)valBar.textContent=`${newT}/${newG}`;

      // --- 当日テーブルの月累計・達成率セル更新 ---
      const mEl=document.getElementById(`rt-month-${id}`);
      const rEl=document.getElementById(`rt-pct-${id}`);
      if(mEl)mEl.textContent=newT;
      if(rEl){rEl.textContent=newP+'%';rEl.style.color=newC;}

      // --- グラフのその日のデータ点だけ差し替えて再描画 ---
      if(state.dashChart){
        state.dashChart.data.datasets[0].data[TODAY_D-1]=sumKpi(si,selKpi);
        // 月累計が変わった場合、対象KPIが選択KPIなら全日更新
        if(kpi===selKpi){
          const days=Array.from({length:DAYS},(_,i)=>i+1);
          state.dashChart.data.datasets[0].data=days.map(d=>kData()[si][d][selKpi]||0);
        }
        state.dashChart.update('active');
      }
      saveStateDebounced();
    };
  });
}

function alertsPanelHTML(){

  const ack=state.alertAck||{};
  const active=al.filter(a=>!ack[a.key]);
  const acked=al.filter(a=>ack[a.key]);
  const dN=active.filter(a=>a.lv==='danger').length,wN=active.filter(a=>a.lv==='warn').length;
  return `<div class="card" style="border-left:4px solid ${active.length?'#D85A30':'#BA7517'}">

    </div>
    ${active.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span class="chip" style="background:${a.lv==='danger'?'var(--bg-danger)':'var(--bg-warning)'};color:${a.lv==='danger'?'var(--text-danger)':'var(--text-warning)'};flex-shrink:0">${a.lv==='danger'?'要対応':'注意'}</span>

      ${a.msg.includes('KPI達成率')?`<button class="btn btn-sm" onclick="state.page='kpi';state.kpiTab='rate';render();" style="font-size:11px;flex-shrink:0;background:#185FA5;color:#fff"><i class="ti ti-chart-bar"></i> KPI確認</button>`:''}
      <button class="btn btn-sm" data-ack-key="${esc(a.key)}" style="font-size:11px;color:var(--text-secondary);flex-shrink:0"><i class="ti ti-check"></i> 確認済み</button>

  </div>`;
}

function teamRank(staffVals,maxVal){
  const sorted=[...staffVals].sort((a,b)=>b.val-a.val);
  const medals=['🥇','🥈','🥉'];
  return `<div class="card">${sorted.map((s,i)=>{
    const pct=Math.round(s.val/maxVal*100);const ach=Math.round(s.val/s.goal*100);const col=ach>=100?'#1D9E75':ach>=70?'#BA7517':'#D85A30';
    return `<div class="team-row"><div class="rank-num">${i<3?medals[i]:(i+1)}</div>
      <div style="width:75px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
