<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM — 顧客管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --accent:#2563EB;--accent-hover:#1d4ed8;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --text:#111827;--text-2:#4b5563;--text-3:#94a3b8;
  --r:8px;--r-md:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);--shadow-md:0 4px 16px rgba(0,0,0,.10);
  --danger:#DC2626;--bg-danger:#FEF2F2;--text-danger:#991B1B;
  --warning:#D97706;--bg-warning:#FFFBEB;--text-warning:#92400E;
  --success:#16A34A;--bg-success:#F0FDF4;--text-success:#166534;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
#app{min-height:100vh;}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#eff6ff 0%,#f1f5f9 100%);}
.login-card{background:var(--card);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid var(--border);}
.login-logo{font-size:22px;font-weight:800;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.login-sub{font-size:13px;color:var(--text-2);margin-bottom:24px;}
.login-notice{background:var(--bg-warning);color:var(--text-warning);border-radius:var(--r);padding:10px 12px;font-size:12px;margin-bottom:18px;display:flex;align-items:center;gap:6px;}

/* ── Top nav ── */
.topnav{background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 20px;height:52px;position:sticky;top:0;z-index:100;gap:2px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.topnav-tab{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:14px;font-weight:500;color:var(--text-2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s;text-decoration:none;user-select:none;white-space:nowrap;}
.topnav-tab:hover{color:var(--text);background:#f8faff;}
.topnav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.topnav-tab i{font-size:16px;}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tnbadge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;}
.tnbadge-admin{background:var(--bg-warning);color:var(--text-warning);}
.tnbadge-staff{background:var(--bg-success);color:var(--text-success);}

/* ── Portal ── */
.portal-bg{min-height:calc(100vh - 52px);padding:28px;background:var(--bg);}
.portal-inner{max-width:1200px;margin:0 auto;}
.portal-header{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.portal-title{font-size:24px;font-weight:800;color:var(--text);}
.portal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.s-card{border-radius:16px;padding:20px 18px;position:relative;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;min-height:210px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.s-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.14);}
.s-card-tag{font-size:11px;font-weight:700;opacity:.7;margin-bottom:8px;letter-spacing:.5px;}
.s-card-deco{position:absolute;top:12px;right:14px;font-size:38px;opacity:.55;}
.s-card-year{font-size:12px;opacity:.65;font-weight:600;}
.s-card-month{font-size:54px;font-weight:900;line-height:1;margin:2px 0;}
.s-card-prod{font-size:14px;font-weight:700;margin-top:6px;opacity:.9;}
.s-card-staff{font-size:11px;opacity:.55;margin-top:3px;}
.s-card-footer{margin-top:auto;padding-top:14px;}
.s-card-btn{width:100%;padding:8px 0;border-radius:24px;font-size:13px;font-weight:700;border:2px solid rgba(0,0,0,.13);background:rgba(255,255,255,.6);cursor:pointer;transition:background .15s;backdrop-filter:blur(2px);}
.s-card-btn:hover{background:rgba(255,255,255,.85);}
.portal-empty{text-align:center;padding:80px 20px;color:var(--text-3);}
.portal-empty i{font-size:56px;opacity:.2;display:block;margin-bottom:12px;}

/* ── Page content ── */
.page{padding:24px;max-width:1200px;margin:0 auto;}

/* ── Crumb ── */
.crumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);margin-bottom:16px;}
.crumb-link{color:var(--accent);cursor:pointer;font-weight:600;}
.crumb-link:hover{text-decoration:underline;}

/* ── List ── */
.list-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.list-title{font-size:22px;font-weight:800;}
.list-count{font-size:13px;color:var(--text-2);font-weight:500;background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:10px;}
.list-tools{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap;}
.search-wrap{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);overflow:hidden;transition:border-color .15s;}
.search-wrap:focus-within{border-color:var(--accent);}
.search-wrap i{padding:0 10px;color:var(--text-3);font-size:16px;}
.search-wrap input{border:none;outline:none;padding:8px 6px;font-size:13px;background:transparent;width:200px;}
.table-wrap{overflow-x:auto;border-radius:var(--r-md);box-shadow:var(--shadow-md);border:1px solid var(--border);}
table.t{width:100%;border-collapse:collapse;font-size:14px;background:var(--card);}
table.t th{background:#f8fafc;padding:12px 16px;text-align:left;font-weight:700;font-size:12px;color:var(--text-2);border-bottom:2px solid var(--border);letter-spacing:.3px;}
table.t td{padding:14px 16px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
table.t tr:last-child td{border-bottom:none;}
table.t tr:hover td{background:#f8faff;}

/* ── Detail ── */
.detail-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.detail-title{font-size:20px;font-weight:800;}
.detail-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:18px;align-items:start;}
.cust-card{background:var(--card);border-radius:var(--r-md);padding:24px;box-shadow:var(--shadow-md);border:1px solid var(--border);}
.avatar{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#eff6ff);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--accent);border:2px solid #bfdbfe;}
.cust-name{font-size:20px;font-weight:800;letter-spacing:-.3px;}
.cust-label{font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:.5px;margin-bottom:4px;}
.irow{display:flex;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:13px;align-items:flex-start;}
.irow:last-child{border-bottom:none;}
.ikey{width:115px;flex-shrink:0;color:var(--text-2);font-weight:600;font-size:12px;padding-top:2px;}
.ival{flex:1;word-break:break-all;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.cpbtn{background:none;border:none;cursor:pointer;color:var(--text-3);padding:2px 4px;border-radius:4px;font-size:14px;line-height:1;transition:color .12s,background .12s;}
.cpbtn:hover{color:var(--accent);background:#eff6ff;}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:#eff6ff;color:var(--accent);margin:1px;}

.panel{background:var(--card);border-radius:var(--r-md);padding:20px;box-shadow:var(--shadow-md);margin-bottom:16px;border:1px solid var(--border);}
.panel-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.h-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;}
.h-tab{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text-2);transition:all .15s;font-weight:500;}
.h-tab:hover{border-color:var(--accent);color:var(--accent);}
.h-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
.timeline{list-style:none;padding-left:30px;position:relative;}
.timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent) 0%,var(--border) 100%);}
.tl-item{position:relative;margin-bottom:18px;}
.tl-icon{position:absolute;left:-25px;top:5px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px #fff,0 0 0 4px var(--accent);}
.tl-icon i{font-size:8px;color:#fff;}
.tl-meta{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.tl-sub{font-size:11px;color:var(--text-3);margin-bottom:6px;}
.tl-body{background:#f8fafc;border-radius:var(--r);padding:10px 14px;font-size:13px;line-height:1.7;border-left:3px solid var(--accent);}
.tl-empty{text-align:center;padding:32px 0;color:var(--text-3);font-size:13px;}

/* ── Settings ── */
.stabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:2px solid var(--border);}
.stab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.stab:hover{color:var(--text);}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}

/* ── Common ── */
.card{background:var(--card);border-radius:var(--r-md);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;border:1px solid var(--border);}
.sec-title{font-weight:700;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;}
.btn:hover{background:#f8fafc;border-color:var(--text-3);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover);}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-danger:hover{opacity:.85;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2);}
.btn-ghost:hover{background:var(--bg);}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none;}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--card);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
.fc:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
textarea.fc{resize:vertical;min-height:110px;line-height:1.7;}
.fl{font-size:12px;color:var(--text-2);margin-bottom:5px;font-weight:700;display:block;letter-spacing:.2px;}
.sel{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--card);color:var(--text);cursor:pointer;outline:none;transition:border-color .15s;}
.sel:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.w-full{width:100%;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{margin-bottom:12px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;}
.bd{background:var(--bg-danger);color:var(--text-danger);}
.bw{background:var(--bg-warning);color:var(--text-warning);}
.bs{background:var(--bg-success);color:var(--text-success);}
.bp{background:#FFF7ED;color:#C45200;border:1.5px solid #FB923C;}
.tip{font-size:12px;color:var(--text-3);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;font-weight:600;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-error{background:#A32D2D;}.toast-warn{background:#B45309;}.toast-ok{background:#15803D;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
.modal{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.2);}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.mfooter{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
.storage-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;max-width:320px;margin-top:8px;}
.storage-fill{height:100%;border-radius:5px;transition:width .5s;}

@media(max-width:900px){.portal-grid{grid-template-columns:repeat(2,1fr);}.detail-grid{grid-template-columns:1fr;}.frow{grid-template-columns:1fr;}}
@media(max-width:600px){.portal-grid{grid-template-columns:1fr 1fr;}.portal-bg{padding:16px;}.page{padding:16px;}.search-wrap input{width:140px;}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const CRM_KEY='crmCustomerState_v1',SESSION_KEY='crmCustomerSession_v1',KPI_KEY='kpiSystemState_v2';
const WARN_BYTES=4*1024*1024;
const ROLES=['代表取締役','取締役','部長','課長','係長','担当者','一般','その他'];
const METHODS=['アウトバウンド','インバウンド','メール対応','OLS','対面','その他'];
const REASONS=['折返し連絡','クレーム対応','新規提案','その他'];
const STATUSES=['未対応','優先対応','対応中','完了'];
const METHOD_ICONS={'アウトバウンド':'ti-phone-outgoing','インバウンド':'ti-phone-incoming','メール対応':'ti-mail','OLS':'ti-device-laptop','対面':'ti-users','その他':'ti-message'};
const REASON_ICONS={'折返し連絡':'ti-phone-call','クレーム対応':'ti-alert-circle','新規提案':'ti-bulb','その他':'ti-message'};

function season(m){
  if([3,4,5].includes(m)) return{label:'春',bg:'linear-gradient(140deg,#FFF0F6 0%,#FFE4EF 100%)',fg:'#BE185D',deco:'🌸',border:'#FBCFE8'};
  if([6,7,8].includes(m)) return{label:'夏',bg:'linear-gradient(140deg,#EFF8FF 0%,#DBEAFE 100%)',fg:'#1E40AF',deco:'🌿',border:'#BFDBFE'};
  if([9,10,11].includes(m)) return{label:'秋',bg:'linear-gradient(140deg,#FFF7ED 0%,#FED7AA 100%)',fg:'#C2410C',deco:'🍂',border:'#FDBA74'};
  return{label:'冬',bg:'linear-gradient(140deg,#F0F4FF 0%,#E0E7FF 100%)',fg:'#3730A3',deco:'❄️',border:'#C7D2FE'};
}

// ── Session ──
function lsess(){try{return JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');}catch{return null;}}
function ssess(s){sessionStorage.setItem(SESSION_KEY,JSON.stringify(s));}
function csess(){sessionStorage.removeItem(SESSION_KEY);}

// ── Data ──
let D=dd();
function dd(){return{products:[],assignments:[],customers:[],contacts:[],appointments:[],_cid:1,_hid:1,_aid:1};}
function ldData(){try{const d=JSON.parse(localStorage.getItem(CRM_KEY)||'null');return d?{...dd(),...d}:dd();}catch{return dd();}}
function svData(){
  const j=JSON.stringify(D);
  try{localStorage.setItem(CRM_KEY,j);}catch{toast('保存失敗: ストレージ容量不足','error');return;}
  if(j.length>WARN_BYTES)toast(`ストレージ${(j.length/1024/1024).toFixed(1)}MB使用中。エクスポートを推奨します`,'warn');
}
function ldKpi(){try{return JSON.parse(localStorage.getItem(KPI_KEY)||'null');}catch{return null;}}

// ── Utils ──
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.className='toast'+(type?` toast-${type}`:'');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);
}
function blockNav(){
  if(isRecording){toast('録画を停止してから移動してください','error');return true;}
  if(!pendingLog)return false;
  toast('対応内容を保存してから移動してください','error');return true;
}
function esc(s){const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML;}
function p2(n){return String(n).padStart(2,'0');}
function fmtD(ts){if(!ts)return'';const d=new Date(ts);return`${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())}`;}
function fmtDT(ts){if(!ts)return'';const d=new Date(ts);return`${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;}
function toLocalDT(ts){const d=new Date(ts);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}`;}
function staffName(si){return ldKpi()?._staffList?.[si]||`スタッフ${si}`;}
function prodName(pid){return D.products.find(p=>p.id===pid)?.name||pid;}
function lastContact(cid){const h=[...D.contacts.filter(h=>h.cid===cid)].sort((a,b)=>b.at-a.at);return h[0]?.at?fmtD(h[0].at):'';}
function statusBadge(s){const m={'未対応':'bd','優先対応':'bp','対応中':'bw','完了':'bs'};return`<span class="badge ${m[s]||'bd'}">${esc(s)}</span>`;}

// ── 電話・メール・Web会議の発信アクション ──
// 現状はOS既定のソフトフォン/メールソフトに委ねる実装。CTI/会議APIを契約したら、ここだけ差し替える。
function callNumber(tel){if(!tel)return;location.href='tel:'+tel;}
function composeMail(email){if(!email)return;location.href='mailto:'+email;}
function openMeeting(url){if(!url)return;window.open(url,'_blank','noopener');}

// ── Web会議の画面録画（ブラウザの画面共有機能を使用。この端末にのみ保存・外部送信なし） ──
let isRecording=false,mediaRecorder=null,recordedChunks=[],recordingStream=null;
function recFnameStamp(){const d=new Date();return`${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}_${p2(d.getHours())}${p2(d.getMinutes())}`;}
async function startRecording(){
  try{
    recordingStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
  }catch(e){
    toast('録画を開始できませんでした（共有がキャンセルされたか、未対応の環境です）','error');
    return;
  }
  recordedChunks=[];
  const mimeType=(window.MediaRecorder&&MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus'))?'video/webm;codecs=vp9,opus':'video/webm';
  mediaRecorder=new MediaRecorder(recordingStream,{mimeType});
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
  recordingStream.getVideoTracks()[0].addEventListener('ended',()=>{if(isRecording)stopRecording();}); // ブラウザ側の「共有を停止」操作にも対応
  mediaRecorder.start();
  isRecording=true;
  render();
}
function stopRecording(){
  if(!mediaRecorder||mediaRecorder.state==='inactive')return;
  const cust=D.customers.find(x=>x.id===ui.dcid);
  const fname=`録画_${(cust?.name||'顧客').replace(/[\\/:*?"<>|]/g,'_')}_${recFnameStamp()}.webm`;
  mediaRecorder.onstop=()=>{
    recordingStream.getTracks().forEach(t=>t.stop());
    const blob=new Blob(recordedChunks,{type:'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    isRecording=false;
    pendingLog={type:'record'};
    render();
    const ta=document.getElementById('hcontent');
    if(ta)ta.value=(ta.value?ta.value+'\n':'')+`[録画ファイル: ${fname}]`;
  };
  mediaRecorder.stop();
}

// ── State ──
let sess=null,pg='portal';
let pendingLog=null; // {type:'call'|'mail'|'meeting'} 発信/メール作成/会議参加後、対応記録を保存するまで他ページへの移動をブロックする
let ui={
  portalStaff:'all',
  ctx:null,         // {si,year,month,pid} from portal card
  ls:'',lstat:'all',// list search, status filter
  dcid:null,dtab:'all', // detail: customer id, tab
  stab:'products',  // settings tab
  modal:null,eid:null, // modal type, edit customer id
};

// ── Render ──
function render(){
  sess=lsess();
  if(sess&&!_backupChecked){_backupChecked=true;checkAutoBackup();}
  document.getElementById('app').innerHTML=sess?appHTML():loginHTML();
  bind();
}

// ── Login ──
function loginHTML(){
  const kpi=ldKpi(),sl=kpi?._staffList||[];
  const opts=sl.map((n,i)=>`<option value="${i}">${esc(n)}</option>`).join('');
  return`<div class="login-wrap"><div class="login-card">
    <div class="login-logo"><i class="ti ti-address-book"></i> CRM 顧客管理</div>
    <div class="login-sub">顧客管理システム</div>
    <div class="login-notice"><i class="ti ti-lock"></i> KPIにログイン済みでも、CRMへの再ログインが必要です</div>
    <div class="fg"><label class="fl">ログイン区分</label><select class="sel w-full" id="lt"><option value="staff">スタッフ</option><option value="admin">管理者</option></select></div>

    <div class="fg"><label class="fl">パスワード</label><input type="password" class="fc" id="lpw" placeholder="パスワードを入力" autocomplete="current-password"></div>

    <div style="text-align:center;margin-top:14px"><a href="kpi_system.html" style="font-size:12px;color:var(--text-2);text-decoration:none"><i class="ti ti-arrow-left"></i> KPI管理に戻る</a></div>
  </div></div>`;
}

// ── App shell ──
function appHTML(){
  const adm=sess.role==='admin';
  const stab=adm?`<span class="topnav-tab${pg==='settings'?' active':''}" data-nav="settings"><i class="ti ti-settings"></i> 設定</span>`:'';
  return`<div>
  <nav class="topnav">
    <a href="kpi_system.html" class="topnav-tab"><i class="ti ti-layout-dashboard"></i> KPI管理</a>
    <span class="topnav-tab${pg!=='settings'?' active':''}" data-nav="portal"><i class="ti ti-address-book"></i> CRM（顧客管理）</span>
    ${stab}
    <div class="topnav-right">
      <span class="tnbadge tnbadge-${sess.role}">${esc(sess.name)}</span>
      <button class="btn btn-sm btn-ghost" id="logout-btn"><i class="ti ti-logout"></i></button>
    </div>
  </nav>
  <div id="parea">${pageHTML()}</div>
  ${ui.modal?modalHTML():''}
</div>`;
}

function pageHTML(){
  if(pg==='portal')   return portalHTML();
  if(pg==='customers')return customersHTML();
  if(pg==='detail')   return detailHTML();
  if(pg==='settings') return settingsHTML();
  return '';
}

// ── Portal ──
function portalHTML(){
  const kpi=ldKpi(),sl=kpi?._staffList||[];
  const adm=sess.role==='admin';
  let asgns=[...D.assignments];
  if(!adm) asgns=asgns.filter(a=>a.si===sess.user);
  else if(ui.portalStaff!=='all') asgns=asgns.filter(a=>a.si===parseInt(ui.portalStaff));
  asgns.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);

  const cards=asgns.map(a=>{
    const s=season(a.month);
    const sn=adm?`<div class="s-card-staff">${esc(sl[a.si]||`スタッフ${a.si}`)}</div>`:'';
    return`<div class="s-card" style="background:${s.bg};color:${s.fg};border:1.5px solid ${s.border}" data-asi="${a.si}" data-ay="${a.year}" data-am="${a.month}" data-ap="${a.pid}">
      <div class="s-card-tag">${s.label}</div>
      <div class="s-card-deco">${s.deco}</div>
      ${sn}
      <div class="s-card-year">${a.year}年</div>
      <div class="s-card-month">${a.month}月</div>
      <div class="s-card-prod">${esc(prodName(a.pid))}</div>
      <div class="s-card-footer"><button class="s-card-btn" style="color:${s.fg};border-color:${s.border}">顧客一覧を見る</button></div>
    </div>`;
  }).join('');

  const sf=adm&&sl.length?`<select class="sel" id="psf">
    <option value="all">全スタッフ</option>
    ${sl.map((n,i)=>`<option value="${i}"${ui.portalStaff===String(i)?' selected':''}>${esc(n)}</option>`).join('')}
  </select>`:'';

  return`<div class="portal-bg"><div class="portal-inner">
    <div class="portal-header">
      <div class="portal-title"><i class="ti ti-package" style="font-size:24px"></i> CRM ポータル</div>
      <div style="margin-left:auto">${sf}</div>
    </div>
    ${asgns.length?`<div class="portal-grid">${cards}</div>`:`<div class="portal-empty"><i class="ti ti-calendar-plus"></i><p>${adm?'設定から担当割り当てを追加してください':'担当割り当てがありません'}</p></div>`}
  </div></div>`;
}

// ── Customer List ──
function customersHTML(){
  const {ctx,ls,lstat}=ui;
  const kpi=ldKpi(),sl=kpi?._staffList||[];
  const adm=sess.role==='admin';

  let custs=[...D.customers];
  if(ctx){
    const cids=new Set(D.contacts.filter(h=>h.si===ctx.si&&h.pid===ctx.pid&&h.year===ctx.year&&h.month===ctx.month).map(h=>h.cid));
    custs=custs.filter(c=>cids.has(c.id)||(c.ctx||[]).some(x=>x.si===ctx.si&&x.pid===ctx.pid&&x.year===ctx.year&&x.month===ctx.month));
  } else if(!adm){
    const mine=new Set([...D.contacts.filter(h=>h.si===sess.user).map(h=>h.cid),...D.customers.filter(c=>(c.ctx||[]).some(x=>x.si===sess.user)).map(c=>c.id)]);
    custs=custs.filter(c=>mine.has(c.id));
  }
  if(ls){const q=ls.toLowerCase();custs=custs.filter(c=>c.name.toLowerCase().includes(q)||(c.company||'').toLowerCase().includes(q)||(c.tel||'').includes(q));}
  if(lstat!=='all') custs=custs.filter(c=>c.status===lstat);

  const crumb=ctx?`<div class="crumb"><span class="crumb-link" data-nav="portal">CRM ポータル</span><i class="ti ti-chevron-right" style="font-size:11px"></i><span>${ctx.year}年${ctx.month}月 / ${esc(prodName(ctx.pid))}${ctx.si!=null?' / '+esc(sl[ctx.si]||''):''}</span></div>`:'';

  const rows=custs.map(c=>`<tr>
    <td class="tip">${c.id}</td>
    <td style="font-weight:600">${esc(c.name)}</td>
    <td>${esc(c.company||'')}</td>
    <td>${esc(c.tel||'')}</td>
    <td class="tip">${lastContact(c.id)}</td>
    <td>${statusBadge(c.status)}</td>
    <td><button class="btn btn-sm btn-primary" data-det="${c.id}">詳細・履歴を見る</button></td>
  </tr>`).join('');

  const canAdd=adm||(sess.role==='staff'&&!!ctx);

  return`<div class="page">
    ${crumb}
    <div class="list-head">
      <div class="list-title">顧客一覧</div>
      <span class="list-count">${custs.length} 件</span>
      <div class="list-tools">
        <div class="search-wrap"><i class="ti ti-search"></i><input type="text" placeholder="検索" id="lsrch" value="${esc(ls)}"></div>
        <label style="font-size:13px;color:var(--text-2)">ステータス</label>
        <select class="sel" id="lstat">
          <option value="all"${lstat==='all'?' selected':''}>すべて</option>
          ${STATUSES.map(s=>`<option value="${s}"${lstat===s?' selected':''}>${s}</option>`).join('')}
        </select>
        ${canAdd?`<button class="btn btn-primary" id="add-cust"><i class="ti ti-user-plus"></i> 新規登録</button>`:''}
      </div>
    </div>
    <div class="table-wrap"><table class="t">
      <thead><tr><th>ID</th><th>顧客名</th><th>会社名/所属</th><th>電話番号</th><th>最新対応日</th><th>ステータス</th><th></th></tr></thead>
      <tbody>${rows||`<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--text-3)">顧客データがありません</td></tr>`}</tbody>
    </table></div>
  </div>`;
}

// ── Customer Detail ──
function detailHTML(){
  const c=D.customers.find(x=>x.id===ui.dcid);
  if(!c) return`<div class="page"><p>顧客が見つかりません</p></div>`;
  const kpi=ldKpi(),sl=kpi?._staffList||[];
  const adm=sess.role==='admin';
  const allH=[...D.contacts.filter(h=>h.cid===c.id)].sort((a,b)=>b.at-a.at);
  const combos=[...new Map(allH.map(h=>[`${h.si}_${h.pid}`,{si:h.si,pid:h.pid}])).values()];

  const tabsH=[
    `<span class="h-tab${ui.dtab==='all'?' active':''}" data-ht="all">全履歴</span>`,
    ...combos.map(x=>{const k=`${x.si}_${x.pid}`;return`<span class="h-tab${ui.dtab===k?' active':''}" data-ht="${k}">${esc(staffName(x.si))} / ${esc(prodName(x.pid))}</span>`;})
  ].join('');

  let fH=allH;
  if(ui.dtab!=='all'){const[si,pid]=ui.dtab.split('_');fH=allH.filter(h=>String(h.si)===si&&h.pid===pid);}

  const tlItems=fH.map(h=>`<li class="tl-item">
    <span class="tl-icon"><i class="ti ${METHOD_ICONS[h.method]||REASON_ICONS[h.reason]||'ti-message'}"></i></span>
    <div class="tl-meta">${fmtDT(h.at)} &nbsp;${esc(staffName(h.si))}${h.manager?` <span style="color:var(--text-3);font-weight:400">/ 責任者: ${esc(h.manager)}</span>`:''}</div>
    <div class="tl-sub">${h.method?esc(h.method)+' / ':''}${esc(h.reason)} / ${esc(prodName(h.pid))}</div>
    <div class="tl-body">${esc(h.content)}</div>
  </li>`).join('');

  const dSi=adm?(ui.ctx?.si??0):sess.user;
  const dPid=ui.ctx?.pid??D.products[0]?.id??'';
  const dY=ui.ctx?.year??new Date().getFullYear();
  const dM=ui.ctx?.month??new Date().getMonth()+1;
  const now=new Date();
  const dDt=`${now.getFullYear()}-${p2(now.getMonth()+1)}-${p2(now.getDate())}T${p2(now.getHours())}:${p2(now.getMinutes())}`;

  const staffOpts=adm?sl.map((n,i)=>`<option value="${i}"${i===dSi?' selected':''}>${esc(n)}</option>`).join(''):`<option value="${sess.user}">${esc(sess.name)}</option>`;
  const prodOpts=D.products.map(p=>`<option value="${p.id}"${p.id===dPid?' selected':''}>${esc(p.name)}</option>`).join('');
  const tags=(c.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');

  // ── Appointment ──
  const apo=D.appointments.find(a=>a.cid===c.id);
  const apoNow=Date.now();
  const apoActive=apo&&apo.at>apoNow-60000;
  const apoIn20=apoActive&&(apo.at-apoNow)<=20*60*1000;
  const apoColor=apoIn20?'#DC2626':'var(--accent)';
  const apoBg=apoIn20?'#FFF0F0':'#EFF6FF';
  const apoBorderStyle=apoIn20?'2px solid #DC2626':'1.5px solid #93C5FD';
  const apoMin=apoActive?Math.max(0,Math.round((apo.at-apoNow)/60000)):0;
  const apoSi=adm?(apo?.si??dSi):sess.user;
  const apoStaffOpts=adm?sl.map((n,i)=>`<option value="${i}"${i===apoSi?' selected':''}>${esc(n)}</option>`).join(''):`<option value="${sess.user}">${esc(sess.name)}</option>`;
  const apoVal=apoActive?toLocalDT(apo.at):'';

  const ymFields=adm
    ?`<div style="margin-top:6px;font-size:12px;color:var(--text-3)">年月: <input type="number" id="hy" value="${dY}" style="width:60px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px"> 年 <input type="number" id="hm" value="${dM}" style="width:40px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px"> 月</div>`
    :`<input type="hidden" id="hy" value="${dY}"><input type="hidden" id="hm" value="${dM}">`;

  const cstatOpts=`<option value="">変更なし</option>`+STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('');

  const plLabel={call:'発信',mail:'メール作成',meeting:'Web会議参加',record:'録画'};
  const pendingBanner=pendingLog?`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg-warning);border:1.5px solid #FDE68A;color:var(--text-warning);border-radius:var(--r);padding:10px 14px;margin-bottom:14px">
    <i class="ti ti-alert-circle" style="font-size:18px"></i>
    <span style="font-size:13px;font-weight:600;flex:1">「${plLabel[pendingLog.type]||'発信'}」操作を行いました。下の「新規対応入力」に対応内容を保存してから他のページに移動してください。</span>
    <button class="btn btn-ghost btn-sm" id="pl-cancel" style="color:var(--text-warning)">対応記録をキャンセル</button>
  </div>`:'';

  return`<div class="page">
  ${pendingBanner}
  <div class="detail-head">
    <button class="btn btn-ghost btn-sm" id="back-btn"><i class="ti ti-arrow-left"></i> 一覧へ戻る</button>
    <div class="detail-title">${esc(c.name)}</div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      ${statusBadge(c.status)}
      ${adm?`<button class="btn btn-sm" data-edit="${c.id}"><i class="ti ti-edit"></i> 編集</button>`:''}
    </div>
  </div>
  <div class="detail-grid">
    <div>
      <div class="cust-card">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
          <div class="avatar"><i class="ti ti-user"></i></div>
          <div>
            <div class="cust-label">顧客情報</div>
            <div class="cust-name">${esc(c.name)}</div>
          </div>
        </div>
        <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
          <div style="font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;margin-bottom:8px"><i class="ti ti-calendar-event" style="font-size:13px"></i> 次回アポイント</div>
          ${apoActive?`<div style="background:${apoBg};border:${apoBorderStyle};border-radius:10px;padding:12px 14px">
            ${apoIn20?`<div style="font-size:12px;font-weight:800;color:#DC2626;margin-bottom:5px">⚡ まもなくアポイント（あと${apoMin}分）</div>`:''}
            <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
              <div style="font-size:18px;font-weight:800;color:${apoColor};letter-spacing:-.3px">${fmtDT(apo.at)}</div>
              ${apo.note?`<div style="font-size:13px;color:var(--text-2);font-weight:500">${esc(apo.note)}</div>`:''}
            </div>
            <div style="font-size:12px;color:var(--text-3);margin-top:5px">担当: ${esc(staffName(apo.si)||'')}</div>
            ${apo.mtg?`<button class="btn btn-primary btn-sm" style="margin-top:8px" data-meeting="${esc(apo.mtg)}"><i class="ti ti-video"></i> Web会議に参加</button>`:''}
          </div>`:'<div style="font-size:13px;color:var(--text-3)">設定なし</div>'}
        </div>
        <div>
          <div class="irow"><span class="ikey">ID</span><span class="ival" style="color:var(--text-3)">${c.id}</span></div>
          <div class="irow"><span class="ikey">会社名/所属</span><span class="ival">${esc(c.company||'—')}</span></div>
          ${c.role?`<div class="irow"><span class="ikey">役職</span><span class="ival">${esc(c.role)}</span></div>`:''}

          ${(c.address)?`<div class="irow"><span class="ikey">住所</span><span class="ival">${esc(c.address)}</span></div>`:''}

          ${c.tel2?`<div class="irow"><span class="ikey">連絡先</span><span class="ival">${esc(c.tel2)}<button class="cpbtn" data-cp="${esc(c.tel2)}"><i class="ti ti-copy"></i></button><button class="cpbtn" data-call="${esc(c.tel2)}" title="発信する"><i class="ti ti-phone-outgoing"></i></button></span></div>`:''}
          <div class="irow"><span class="ikey">メール</span><span class="ival">${c.email?`${esc(c.email)}<button class="cpbtn" data-cp="${esc(c.email)}"><i class="ti ti-copy"></i></button><button class="cpbtn" data-mail="${esc(c.email)}" title="メール作成"><i class="ti ti-mail"></i></button>`:'—'}</span></div>
          ${tags?`<div class="irow"><span class="ikey">タグ</span><span class="ival">${tags}</span></div>`:''}
          <div class="irow"><span class="ikey">最新対応日</span><span class="ival" style="font-weight:600">${lastContact(c.id)||'—'}</span></div>

      </div>
      <div class="panel" style="margin-top:0">

        <div style="display:flex;gap:8px">

  const remaining=Math.max(0,((WARN_BYTES-size)/1024)).toFixed(0);
  const statusMsg=size>WARN_BYTES?'⚠ 容量がいっぱいです。今すぐバックアップしてください':size>WARN_BYTES*.7?'⚠ 残り少なくなっています':'✓ まだ余裕があります';

  <div class="card">

        </div>
        <button class="btn btn-primary btn-sm" id="exp-all"><i class="ti ti-download"></i> 保存する</button>
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg)">
        <i class="ti ti-upload" style="font-size:28px;color:var(--accent);flex-shrink:0"></i>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">バックアップから復元する</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:2px">保存したバックアップJSONファイルを選択すると、現在のデータが上書きされます（外部送信なし）。</div>
        </div>
        <input type="file" id="restore-file-input" accept="application/json" style="display:none">
        <button class="btn btn-sm" id="restore-pick-btn"><i class="ti ti-upload"></i> ファイルを選択</button>

      </div>`:''}
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg)">
        <i class="ti ti-package" style="font-size:28px;color:var(--text-2);flex-shrink:0"></i>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">商材リストだけを保存</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:2px">商材A・Bなどの名前一覧のみ保存します。<br>プロジェクト終了後に別の場所へ移すときに使います。</div>

        <button class="btn btn-sm" id="exp-prod"><i class="ti ti-download"></i> 保存する</button>

        <button class="btn btn-sm" id="exp-csv"><i class="ti ti-download"></i> 保存する</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sec-title"><i class="ti ti-restore"></i> バックアップから元に戻す（復元）</div>

    <div style="padding:12px;border:2px solid var(--bg-danger);border-radius:var(--r);background:var(--bg-danger);margin-bottom:12px">
      <p style="font-size:12px;color:var(--text-danger);font-weight:600"><i class="ti ti-alert-triangle"></i> 注意：今あるデータはすべて消えて、ファイルの内容に入れ替わります</p>
    </div>
    <input type="file" id="impfile" accept=".json" style="font-size:13px">
    <div style="margin-top:10px"><button class="btn btn-primary" id="impbtn"><i class="ti ti-restore"></i> 復元する</button></div>
  </div>`;
}

// ── Bind events ──
function bind(){
  // Login
  document.getElementById('lt')?.addEventListener('change',e=>{document.getElementById('sw').style.display=e.target.value==='admin'?'none':'';});
  document.getElementById('lbtn')?.addEventListener('click',doLogin);
  document.getElementById('lpw')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  // Logout
  document.getElementById('logout-btn')?.addEventListener('click',()=>{if(blockNav())return;exportFullBackup(true);csess();render();});
  // Top nav
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{if(blockNav())return;pg=el.dataset.nav;if(pg==='portal')ui.ctx=null;render();});
  });
  // Portal
  document.getElementById('psf')?.addEventListener('change',e=>{ui.portalStaff=e.target.value;render();});
  document.querySelectorAll('[data-asi]').forEach(el=>{
    el.addEventListener('click',()=>{
      ui.ctx={si:parseInt(el.dataset.asi),year:parseInt(el.dataset.ay),month:parseInt(el.dataset.am),pid:el.dataset.ap};
      pg='customers';render();
    });
  });
  // List
  document.getElementById('lsrch')?.addEventListener('input',e=>{ui.ls=e.target.value;render();});
  document.getElementById('lstat')?.addEventListener('change',e=>{ui.lstat=e.target.value;render();});
  document.getElementById('add-cust')?.addEventListener('click',()=>{ui.modal='add-cust';ui.eid=null;render();});
  document.querySelectorAll('[data-det]').forEach(el=>{el.addEventListener('click',()=>{ui.dcid=parseInt(el.dataset.det);ui.dtab='all';pg='detail';render();});});
  // Detail
  document.getElementById('back-btn')?.addEventListener('click',()=>{if(blockNav())return;pg='customers';render();});
  document.querySelectorAll('[data-ht]').forEach(el=>{el.addEventListener('click',()=>{ui.dtab=el.dataset.ht;render();});});
  // sv-contact → show confirm bar (no save yet)
  document.getElementById('sv-contact')?.addEventListener('click',()=>{
    const content=(document.getElementById('hcontent')?.value||'').trim();
    if(!content){toast('対応内容を入力してください','error');return;}
    const bar=document.getElementById('cc-bar');
    if(bar) bar.style.display='flex';
  });
  document.getElementById('cc-ok')?.addEventListener('click',saveContact);
  document.getElementById('cc-cancel')?.addEventListener('click',()=>{
    const bar=document.getElementById('cc-bar');if(bar) bar.style.display='none';
  });
  document.getElementById('cl-contact')?.addEventListener('click',()=>{
    const el=document.getElementById('hcontent');if(el)el.value='';
    const bar=document.getElementById('cc-bar');if(bar) bar.style.display='none';
  });
  // Zip lookup
  document.getElementById('zip-lookup')?.addEventListener('click',lookupZip);
  document.querySelectorAll('[data-cp]').forEach(el=>{el.addEventListener('click',()=>{navigator.clipboard.writeText(el.dataset.cp).then(()=>toast('コピーしました','ok'));});});
  document.querySelectorAll('[data-call]').forEach(el=>{el.addEventListener('click',()=>{callNumber(el.dataset.call);pendingLog={type:'call'};render();});});
  document.querySelectorAll('[data-mail]').forEach(el=>{el.addEventListener('click',()=>{composeMail(el.dataset.mail);pendingLog={type:'mail'};render();});});
  document.querySelectorAll('[data-meeting]').forEach(el=>{el.addEventListener('click',()=>{openMeeting(el.dataset.meeting);pendingLog={type:'meeting'};render();});});
  document.getElementById('pl-cancel')?.addEventListener('click',()=>{pendingLog=null;render();});
  document.getElementById('rec-start')?.addEventListener('click',startRecording);
  document.getElementById('rec-stop')?.addEventListener('click',stopRecording);
  document.querySelectorAll('[data-edit]').forEach(el=>{el.addEventListener('click',()=>{ui.modal='edit-cust';ui.eid=parseInt(el.dataset.edit);render();});});
  // Settings tabs
  document.querySelectorAll('[data-stab]').forEach(el=>{el.addEventListener('click',()=>{ui.stab=el.dataset.stab;render();});});
  // Products
  document.getElementById('addprod')?.addEventListener('click',()=>{
    const name=document.getElementById('npname')?.value.trim();
    if(!name){toast('商材名を入力してください','error');return;}
    D.products.push({id:'p'+Date.now(),name});svData();toast('商材を追加しました','ok');render();
  });
  document.querySelectorAll('[data-dp]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(D.assignments.some(a=>a.pid===el.dataset.dp)){toast('この商材は割り当てで使用中です','error');return;}
      D.products=D.products.filter(p=>p.id!==el.dataset.dp);svData();toast('削除しました','ok');render();
    });
  });
  // Assignments
  document.getElementById('addassign')?.addEventListener('click',()=>{
    const si=parseInt(document.getElementById('asi').value),year=parseInt(document.getElementById('ay').value),month=parseInt(document.getElementById('am').value),pid=document.getElementById('apid').value;
    if(!pid){toast('商材を選択してください','error');return;}
    if(D.assignments.some(a=>a.si===si&&a.year===year&&a.month===month&&a.pid===pid)){toast('同じ割り当てが既に存在します','error');return;}
    D.assignments.push({id:'a'+Date.now(),si,year,month,pid});svData();toast('割り当てを追加しました','ok');render();
  });
  document.querySelectorAll('[data-da]').forEach(el=>{el.addEventListener('click',()=>{D.assignments=D.assignments.filter(a=>a.id!==el.dataset.da);svData();toast('削除しました','ok');render();});});
  // Export / Import
  document.getElementById('exp-all')?.addEventListener('click',()=>{exportFullBackup(false);render();});
  document.getElementById('restore-pick-btn')?.addEventListener('click',()=>document.getElementById('restore-file-input').click());
  document.getElementById('restore-file-input')?.addEventListener('change',e=>onRestoreFileSelected(e.target.files[0]));
  document.getElementById('restore-confirm-btn')?.addEventListener('click',confirmRestore);
  document.getElementById('restore-cancel-btn')?.addEventListener('click',cancelRestore);
  document.getElementById('exp-prod')?.addEventListener('click',()=>expJSON('crm_products',{products:D.products}));
  document.getElementById('exp-csv')?.addEventListener('click',expCSV);
  document.getElementById('impbtn')?.addEventListener('click',()=>{
    const f=document.getElementById('impfile')?.files[0];
    if(!f){toast('ファイルを選択してください','error');return;}
    const r=new FileReader();
    r.onload=e=>{try{const d=JSON.parse(e.target.result);D={...dd(),...d};svData();toast('インポートしました','ok');render();}catch{toast('ファイル形式が正しくありません','error');}};
    r.readAsText(f);
  });
  // Modal
  document.getElementById('mov')?.addEventListener('click',e=>{if(e.target.id==='mov'){ui.modal=null;render();}});
  document.getElementById('mcancel')?.addEventListener('click',()=>{ui.modal=null;render();});
  document.getElementById('msave')?.addEventListener('click',saveCust);
  // Appointment
  document.getElementById('apo-save')?.addEventListener('click',saveApo);
  document.getElementById('apo-del')?.addEventListener('click',deleteApo);
}

// ── Login ──
function doLogin(){
  const kpi=ldKpi();if(!kpi){toast('KPIシステムのデータが見つかりません','error');return;}
  const type=document.getElementById('lt')?.value||'staff';
  const pw=document.getElementById('lpw')?.value||'';
  if(!pw){toast('パスワードを入力してください','error');return;}
  if(type==='admin'){
    if(pw!==(kpi.adminPw||'admin@1234')){toast('パスワードが違います','error');return;}
    ssess({role:'admin',user:null,name:'管理者'});
  } else {
    const si=parseInt(document.getElementById('ls')?.value??'-1');
    const sl=kpi._staffList||[];
    if(si<0||si>=sl.length){toast('スタッフを選択してください','error');return;}
    if(pw!==(kpi.staffPw?.[si]?.pw||'kpi@1234')){toast('パスワードが違います','error');return;}
    ssess({role:'staff',user:si,name:sl[si]});
  }
  const _lp=new URLSearchParams(location.search).get('cid');
  if(_lp){const _lc=D.customers.find(x=>String(x.id)===_lp);if(_lc){ui.dcid=_lc.id;pg='detail';}}
  render();
}

// ── Save contact ──
function saveContact(){
  const cid=parseInt(document.getElementById('cc-ok').dataset.cid);
  const content=(document.getElementById('hcontent')?.value||'').trim();
  if(!content){toast('対応内容を入力してください','error');return;}
  const pid=document.getElementById('hpid')?.value;
  if(!pid){toast('商材を選択してください','error');return;}
  const dtv=document.getElementById('hdt')?.value;
  const at=dtv?new Date(dtv).getTime():Date.now();
  const si=parseInt(document.getElementById('hsi')?.value);
  const method=document.getElementById('hmethod')?.value||METHODS[0];
  const reason=document.getElementById('hreason')?.value||REASONS[0];
  const manager=(document.getElementById('hmanager')?.value||'').trim();
  const year=parseInt(document.getElementById('hy')?.value||new Date().getFullYear());
  const month=parseInt(document.getElementById('hm')?.value||new Date().getMonth()+1);
  const contactStatus=document.getElementById('h-cstat')?.value||'';
  D.contacts.push({id:'h'+D._hid++,cid,si,pid,year,month,at,method,reason,manager,content});
  const c=D.customers.find(x=>x.id===cid);
  if(c){
    c.lastAt=at;
    if(contactStatus) c.status=contactStatus;
  }
  pendingLog=null;
  svData();toast('保存しました','ok');render();
}

// ── Save customer ──
function saveCust(){
  const name=(document.getElementById('mn')?.value||'').trim();
  if(!name){toast('顧客名を入力してください','error');return;}
  const company=(document.getElementById('mc')?.value||'').trim();
  const role=document.getElementById('mr')?.value||'';
  const tel=(document.getElementById('mt')?.value||'').trim();
  const tel2=(document.getElementById('mt2')?.value||'').trim();
  const email=(document.getElementById('me')?.value||'').trim();
  const postalCode=(document.getElementById('mzip')?.value||'').replace(/[^0-9]/g,'');
  const address=(document.getElementById('ma')?.value||'').trim();
  const status=document.getElementById('mst')?.value||STATUSES[0];
  const tags=(document.getElementById('mtg')?.value||'').split(',').map(t=>t.trim()).filter(Boolean);

  if(ui.modal==='edit-cust'&&ui.eid){
    const c=D.customers.find(x=>x.id===ui.eid);
    if(c) Object.assign(c,{name,company,role,tel,tel2,email,postalCode,address,status,tags});
    svData();toast('更新しました','ok');ui.modal=null;render();
  } else {
    const ctx=ui.ctx?[{...ui.ctx}]:[];
    D.customers.push({id:D._cid++,name,company,role,tel,tel2,email,postalCode,address,status,tags,ctx,createdAt:Date.now()});
    svData();toast('顧客を登録しました','ok');ui.modal=null;render();
  }
}

// ── Zip lookup ──
async function lookupZip(){
  const raw=(document.getElementById('mzip')?.value||'');
  const zip=raw.replace(/[^0-9０-９]/g,'').replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));
  if(zip.length!==7){toast('郵便番号を7桁（ハイフンなし）で入力してください','error');return;}
  try{
    const res=await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`);
    const data=await res.json();
    if(data.results?.[0]){
      const r=data.results[0];
      const addr=r.address1+r.address2+r.address3;
      const el=document.getElementById('ma');
      if(el){el.value=addr;el.focus();}
      toast('住所（都道府県〜丁目まで）を入力しました。番地以降を追記してください','ok');
    }else{toast('該当する住所が見つかりませんでした','error');}
  }catch{toast('住所の自動入力に失敗しました','error');}
}

// ── Export ──
function expJSON(name,data){
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${name}_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
// ── データバックアップ（端末ローカルのみ・外部送信なし） ──
const BACKUP_KEY='_crmCustomerLastBackupAt';
const BACKUP_INTERVAL_MS=12*60*60*1000; // 12時間以上経過していたらログイン時に自動バックアップ
let _backupChecked=false;
function lastBackupLabel(){
  const t=parseInt(localStorage.getItem(BACKUP_KEY)||'0');
  if(!t)return '（バックアップ未実施）';
  const d=new Date(t);
  return '最終バックアップ: '+d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());
}
function exportFullBackup(silent){
  svData();
  expJSON('crm_all',D);
  localStorage.setItem(BACKUP_KEY,String(Date.now()));
  if(!silent)toast('バックアップを保存しました','ok');
}
function checkAutoBackup(){
  const t=parseInt(localStorage.getItem(BACKUP_KEY)||'0');
  if(Date.now()-t>BACKUP_INTERVAL_MS)exportFullBackup(true);
}
let _restorePending=null; // {text, name}
function onRestoreFileSelected(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let parsed;
    try{parsed=JSON.parse(reader.result);}catch{toast('JSONファイルを読み込めませんでした','error');return;}
    if(!parsed||typeof parsed!=='object'||!('customers' in parsed)||!('contacts' in parsed)){toast('CRMシステムのバックアップファイルではないようです','error');return;}
    _restorePending={text:reader.result,name:file.name};
    render();
  };
  reader.readAsText(file);
}
function confirmRestore(){
  if(!_restorePending)return;
  localStorage.setItem(CRM_KEY,_restorePending.text);
  location.reload();
}
function cancelRestore(){_restorePending=null;render();}
function expCSV(){
  const h=['ID','顧客名','会社名','役職','電話番号','メール','住所','ステータス','タグ','登録日'];
  const rows=D.customers.map(c=>[c.id,c.name,c.company||'',c.role||'',c.tel||'',c.email||'',c.address||'',c.status,(c.tags||[]).join('|'),fmtD(c.createdAt)]);
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`crm_customers_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ── Appointment save / delete ──
function saveApo(){
  const cid=parseInt(document.getElementById('apo-save').dataset.cid);
  const dt=document.getElementById('apo-dt')?.value;
  if(!dt){toast('日時を入力してください','error');return;}
  const at=new Date(dt).getTime();
  if(at<Date.now()-60000){toast('過去の日時は設定できません','error');return;}
  const note=(document.getElementById('apo-note')?.value||'').trim();
  const mtg=(document.getElementById('apo-mtg')?.value||'').trim();
  if(mtg&&!/^https?:\/\//.test(mtg)){toast('Web会議URLはhttp(s)://から入力してください','error');return;}
  const si=parseInt(document.getElementById('apo-si')?.value??sess?.user??0);
  D.appointments=D.appointments.filter(a=>a.cid!==cid);
  D.appointments.push({id:'apo'+D._aid++,cid,si,at,note,mtg});
  svData();toast('アポイントを設定しました','ok');render();
}
function deleteApo(){
  const cid=parseInt(document.getElementById('apo-del').dataset.cid);
  D.appointments=D.appointments.filter(a=>a.cid!==cid);
  svData();toast('アポイントを削除しました','ok');render();
}

// ── Appointment alert watchdog (self-contained, runs on all pages) ──
(function apoWatchdog(){
  var CRM_KEY='crmCustomerState_v1',DIS_KEY='_apoDismissed',BID='_apoBanner',TWENTY=20*60*1000;
  function p(n){return String(n).padStart(2,'0');}
  function fdt(ts){var d=new Date(ts);return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());}
  function es(s){var e=document.createElement('div');e.textContent=String(s??'');return e.innerHTML;}
  function getUser(){
    try{var c=JSON.parse(sessionStorage.getItem('crmCustomerSession_v1')||'null');if(c?.role)return c;}catch{}
    try{var k=JSON.parse(localStorage.getItem('kpiSystemState_v2')||'null');if(k?.role)return{role:k.role,user:k.user};}catch{}
    return null;
  }
  function run(){
    var s=getUser();if(!s)return;
    var crmD;try{crmD=JSON.parse(localStorage.getItem(CRM_KEY)||'null');}catch{return;}
    if(!crmD?.appointments?.length)return;
    var now=Date.now(),dis=JSON.parse(sessionStorage.getItem(DIS_KEY)||'[]');
    var found=crmD.appointments.filter(function(a){
      if(dis.indexOf(a.id)>=0)return false;
      var diff=a.at-now;
      if(diff<-60000||diff>TWENTY)return false;
      if(s.role==='staff'&&a.si!==s.user)return false;
      return true;
    });
    show(found,crmD.customers||[]);
  }
  function show(apos,custs){
    var el=document.getElementById(BID);
    if(!apos.length){if(el)el.remove();return;}
    if(!el){el=document.createElement('div');el.id=BID;el.style.cssText='position:fixed;top:0;left:0;right:0;z-index:10000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';document.body.prepend(el);}
    var html=apos.map(function(a,i){
      var c=custs.find(function(x){return x.id===a.cid;});
      var diff=a.at-Date.now(),min=Math.max(0,Math.round(diff/60000));
      var label=min<=0?'今すぐ！':'あと'+min+'分';
      var name=c?es(c.name):'顧客';
      var cid=c?'<span style="font-size:13px;font-weight:500;opacity:.75;margin-left:6px">ID: <span data-apo-copy="'+c.id+'" style="cursor:pointer;background:rgba(255,255,255,.18);border-radius:4px;padding:1px 6px;font-family:monospace;user-select:all" title="クリックしてコピー">'+c.id+'</span></span>':'';
      var note=a.note?' / '+es(a.note):'';
      var sep=i>0?'<div style="border-top:1px solid rgba(255,255,255,.25);margin:10px 0"></div>':'';
      var href='customer_crm.html'+(c?'?cid='+c.id:'');
      return sep+'<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap"><span style="font-size:26px;flex-shrink:0">🔔</span><div style="flex:1;min-width:0"><div style="font-size:18px;font-weight:800">【'+es(label)+'】 '+name+'様'+cid+' — アポイント</div><div style="font-size:13px;opacity:.9;margin-top:3px">'+fdt(a.at)+note+'</div></div><a href="'+href+'" style="background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap">詳細を見る</a><button data-dis="'+a.id+'" style="background:rgba(0,0,0,.18);border:none;color:rgba(255,255,255,.85);border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px;white-space:nowrap">閉じる</button></div>';
    }).join('');
    el.innerHTML='<div style="background:linear-gradient(135deg,#DC2626,#B91C1C);color:#fff;padding:16px 22px;box-shadow:0 4px 24px rgba(0,0,0,.35)">'+html+'</div>';
    el.querySelectorAll('[data-dis]').forEach(function(b){b.onclick=function(){var dis=JSON.parse(sessionStorage.getItem(DIS_KEY)||'[]');dis.push(b.dataset.dis);sessionStorage.setItem(DIS_KEY,JSON.stringify(dis));run();};});
    el.querySelectorAll('[data-apo-copy]').forEach(function(b){b.onclick=function(){navigator.clipboard.writeText(b.dataset.apoCopy).then(function(){var o=b.style.background;b.style.background='rgba(255,255,255,.45)';setTimeout(function(){b.style.background=o;},1200);}).catch(function(){});};});
  }
  run();
  setInterval(run,30000);
})();
